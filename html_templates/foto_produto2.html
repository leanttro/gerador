<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --cor-fundo: CHAVE_COR_FUNDO;
            --cor-texto-principal: CHAVE_COR_TEXTO;
            --cor-destaque: CHAVE_COR_DESTAQUE;
            --cor-destaque-secundaria: CHAVE_COR_SECUNDARIA;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #1a1a1a;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        /* ==============================
           WRAPPER — borda preta externa
           ============================== */
        .card-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            border-radius: 18px;
            background-color: #000;
            padding: 8px;
            flex-shrink: 0;
            display: flex;
        }

        /* ==============================
           CONTAINER INTERNO
           ============================== */
        .card {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            flex-shrink: 0;
            background-color: #000;
        }

        /* ==============================
           FOTO BORRADA — sangra -40px em todos os lados
           para cobrir completamente, sem borda branca
           ============================== */
        .card-bg-blur {
            position: absolute;
            inset: -40px;
            width: calc(100% + 80px);
            height: calc(100% + 80px);
            object-fit: cover;
            object-position: center;
            z-index: 0;
            filter: blur(22px) brightness(0.45) saturate(0.7);
        }

        /* FOTO PRINCIPAL — cobre o card inteiro */
        .card-bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            z-index: 1;
        }

        /* No 4:5 desativa o blur (imagem já cobre tudo) */
        .card-wrapper.proporcao-4-5 .card-bg-blur {
            display: none;
        }

        /* OVERLAY gradiente para legibilidade do texto */
        .card-overlay {
            position: absolute;
            inset: 0;
            z-index: 2;
            background: linear-gradient(
                to bottom,
                rgba(0,0,0,0.18) 0%,
                rgba(0,0,0,0.08) 35%,
                rgba(0,0,0,0.55) 65%,
                rgba(0,0,0,0.82) 100%
            );
        }

        /* ==============================
           LOGO — topo centralizado
           ============================== */
        .card-logo-wrap {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px 24px 16px;
        }

        .card-logo {
            max-width: 180px;
            max-height: 60px;
            object-fit: contain;
            filter: drop-shadow(0 1px 6px rgba(0,0,0,0.35));
        }

        /* ==============================
           BLOCO DE TEXTO — rodapé
           ============================== */
        .card-body {
            position: relative;
            z-index: 10;
            padding: 0 28px 36px 28px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Linha decorativa sobre o bloco de texto */
        .card-body::before {
            content: '';
            display: block;
            width: 36px;
            height: 3px;
            background-color: var(--cor-destaque);
            border-radius: 2px;
            margin-bottom: 4px;
        }

        /* TÍTULO — Bebas Neue, grande e impactante */
        .card-titulo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 54px;
            font-weight: 400;
            color: var(--cor-texto-principal);
            line-height: 1.0;
            letter-spacing: 1px;
            text-shadow: 0 2px 12px rgba(0,0,0,0.45);
        }

        /* Título menor no 4:5 */
        .card-wrapper.proporcao-4-5 .card-titulo {
            font-size: 44px;
        }

        /* FRASE — Montserrat limpo */
        .card-frase {
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: var(--cor-destaque-secundaria);
            line-height: 1.55;
            letter-spacing: 0.2px;
            opacity: 0.92;
        }

    </style>
</head>
<body>

    <!--
        PROPORÇÃO PADRÃO:      9:16  →  <div class="card-wrapper">
        PROPORÇÃO ALTERNATIVA: 4:5   →  <div class="card-wrapper proporcao-4-5">
    -->
    <div class="card-wrapper">
        <div class="card">

            <!-- FOTO BORRADA DE FUNDO (preenche laterais no 9:16) -->
            <img class="card-bg-blur" src="CHAVE_IMAGEM" alt="">

            <!-- FOTO PRINCIPAL -->
            <img class="card-bg" src="CHAVE_IMAGEM" alt="Foto do produto">

            <!-- OVERLAY -->
            <div class="card-overlay"></div>

            <!-- LOGO NO TOPO -->
            <div class="card-logo-wrap">
                <img class="card-logo" src="CHAVE_LOGO" alt="Logo">
            </div>

            <!-- TÍTULO + FRASE NO RODAPÉ -->
            <div class="card-body">
                <h1 class="card-titulo">CHAVE_TITULO</h1>
                <p class="card-frase">CHAVE_FRASE</p>
            </div>

        </div>
    </div>

</body>
</html>
