<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Marmita Fit — Cinematográfico</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,700;0,900;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --cor-fundo: CHAVE_COR_FUNDO;
            --cor-texto-principal: CHAVE_COR_TEXTO;
            --cor-destaque: CHAVE_COR_DESTAQUE;
            --cor-destaque-secundaria: CHAVE_COR_SECUNDARIA;

            /* Duração de cada slide em ms — controlado pelo JS */
            --slide-duration: 2800ms;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
        }

        /* =============================================
           STAGE — proporção 4:5 (400×500)
           ============================================= */
        #stage {
            width: 400px;
            height: 500px;
            position: relative;
            overflow: hidden;
            background: var(--cor-fundo);
            perspective: 1200px;
        }

        /* =============================================
           GRAIN OVERLAY — textura cinematográfica
           ============================================= */
        #stage::before {
            content: '';
            position: absolute;
            inset: 0;
            z-index: 100;
            pointer-events: none;
            opacity: 0.035;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 180px;
        }

        /* =============================================
           LETTERBOX BARS — cinema superior e inferior
           ============================================= */
        .letterbox {
            position: absolute;
            left: 0; right: 0;
            height: 28px;
            background: #000;
            z-index: 90;
            pointer-events: none;
        }
        .letterbox-top    { top: 0; }
        .letterbox-bottom { bottom: 0; }

        /* =============================================
           SLIDES
           ============================================= */
        .slide {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transform-style: preserve-3d;
            will-change: transform, opacity;
        }

        .slide.active   { opacity: 1; pointer-events: auto; }
        .slide.entering { animation: slideEnter 0.7s cubic-bezier(0.16,1,0.3,1) forwards; }
        .slide.leaving  { animation: slideLeave 0.7s cubic-bezier(0.7,0,0.84,0) forwards; }

        @keyframes slideEnter {
            from { opacity: 0; transform: translateZ(-120px) translateY(30px) rotateX(6deg); }
            to   { opacity: 1; transform: translateZ(0)      translateY(0)    rotateX(0deg); }
        }
        @keyframes slideLeave {
            from { opacity: 1; transform: translateZ(0)       translateY(0)     rotateX(0deg); }
            to   { opacity: 0; transform: translateZ(-80px)  translateY(-20px)  rotateX(-4deg); }
        }

        /* =============================================
           SLIDE 1 — LOGO + NOME EMPRESA (ABERTURA)
           ============================================= */
        #slide-1 {
            background: var(--cor-fundo);
        }

        .s1-bg-text {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            pointer-events: none;
        }
        .s1-bg-word {
            font-size: 88px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -4px;
            color: var(--cor-destaque);
            opacity: 0;
            white-space: nowrap;
            animation: bgWordReveal 1.4s cubic-bezier(0.16,1,0.3,1) 0.2s forwards;
            -webkit-text-stroke: 1px var(--cor-destaque);
            color: transparent;
        }
        @keyframes bgWordReveal {
            from { opacity: 0; transform: scale(0.85) translateY(20px); letter-spacing: 10px; }
            to   { opacity: 0.07; transform: scale(1) translateY(0); letter-spacing: -4px; }
        }

        .s1-logo-wrap {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }
        .s1-logo {
            max-width: 220px;
            max-height: 110px;
            object-fit: contain;
            opacity: 0;
            transform: translateY(24px) scale(0.9);
            animation: logoReveal 0.9s cubic-bezier(0.16,1,0.3,1) 0.35s forwards;
            filter: drop-shadow(0 8px 32px rgba(0,0,0,0.18));
        }
        @keyframes logoReveal {
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .s1-tagline {
            font-size: 10px;
            font-weight: 400;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--cor-destaque-secundaria);
            opacity: 0;
            animation: fadeUp 0.7s ease-out 0.85s forwards;
        }

        /* Linha horizontal decorativa */
        .s1-line {
            width: 0;
            height: 1px;
            background: var(--cor-destaque);
            opacity: 0.35;
            animation: lineGrow 0.8s ease-out 0.6s forwards;
        }
        @keyframes lineGrow {
            to { width: 120px; }
        }

        /* =============================================
           SLIDE 2 — FOTO DO PRATO (HERO 3D)
           ============================================= */
        #slide-2 {
            background: var(--cor-fundo);
            padding: 28px 24px;
        }

        .s2-img-container {
            width: 100%;
            height: 340px;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            transform-style: preserve-3d;
            box-shadow:
                0 40px 80px rgba(0,0,0,0.22),
                0 8px 24px rgba(0,0,0,0.12);
            opacity: 0;
            transform: perspective(900px) rotateX(8deg) translateY(30px) scale(0.96);
            animation: imgReveal3D 1s cubic-bezier(0.16,1,0.3,1) 0.2s forwards;
        }
        @keyframes imgReveal3D {
            to { opacity: 1; transform: perspective(900px) rotateX(0deg) translateY(0) scale(1); }
        }

        .s2-img-container img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
            animation: kenBurns 3s ease-in-out 0.2s both;
        }
        @keyframes kenBurns {
            from { transform: scale(1.06) translateX(-8px); }
            to   { transform: scale(1.0)  translateX(0); }
        }

        /* Vinheta sobre a foto */
        .s2-img-container::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to bottom,
                rgba(0,0,0,0) 50%,
                rgba(0,0,0,0.45) 100%
            );
            border-radius: 16px;
        }

        /* Nome da empresa flutuando no canto */
        .s2-brand-tag {
            position: absolute;
            top: 16px;
            right: 16px;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #fff;
            background: var(--cor-destaque);
            padding: 4px 10px;
            border-radius: 20px;
            z-index: 5;
            opacity: 0;
            animation: fadeUp 0.5s ease-out 0.9s forwards;
        }

        /* =============================================
           SLIDE 3 — TÍTULO DO PRATO
           ============================================= */
        #slide-3 {
            background: var(--cor-fundo);
            padding: 0 36px;
            align-items: flex-start;
        }

        .s3-eyebrow {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--cor-destaque);
            opacity: 0;
            animation: fadeUp 0.5s ease-out 0.15s forwards;
            margin-bottom: 10px;
        }

        .s3-title {
            font-size: 46px;
            font-weight: 900;
            line-height: 0.95;
            letter-spacing: -2px;
            text-transform: uppercase;
            color: var(--cor-texto-principal);
            overflow: hidden;
        }

        /* Cada palavra em linha separada com reveal */
        .s3-title .word {
            display: block;
            opacity: 0;
            transform: translateY(60px) rotateX(-20deg);
            transform-origin: bottom center;
            transform-style: preserve-3d;
        }
        .s3-title .word:nth-child(1) { animation: word3DReveal 0.65s cubic-bezier(0.16,1,0.3,1) 0.2s forwards; }
        .s3-title .word:nth-child(2) { animation: word3DReveal 0.65s cubic-bezier(0.16,1,0.3,1) 0.38s forwards; }
        .s3-title .word:nth-child(3) { animation: word3DReveal 0.65s cubic-bezier(0.16,1,0.3,1) 0.56s forwards; }
        .s3-title .word:nth-child(4) { animation: word3DReveal 0.65s cubic-bezier(0.16,1,0.3,1) 0.74s forwards; }
        .s3-title .word:nth-child(5) { animation: word3DReveal 0.65s cubic-bezier(0.16,1,0.3,1) 0.92s forwards; }

        @keyframes word3DReveal {
            to { opacity: 1; transform: translateY(0) rotateX(0deg); }
        }

        /* Linha decorativa que cresce */
        .s3-line {
            width: 0; height: 2px;
            background: var(--cor-destaque);
            margin-top: 18px;
            animation: lineGrow2 0.8s ease-out 0.7s forwards;
        }
        @keyframes lineGrow2 {
            to { width: 60px; }
        }

        /* =============================================
           SLIDE 4 — INGREDIENTES
           ============================================= */
        #slide-4 {
            background: var(--cor-fundo);
            padding: 0 36px;
            align-items: flex-start;
        }

        .s4-label {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--cor-destaque);
            opacity: 0;
            animation: fadeUp 0.4s ease-out 0.1s forwards;
            margin-bottom: 16px;
        }

        .s4-ingredients {
            font-size: 22px;
            font-weight: 300;
            font-style: italic;
            line-height: 1.45;
            color: var(--cor-texto-principal);
            opacity: 0;
            transform: translateX(-30px);
            animation: slideRight 0.8s cubic-bezier(0.16,1,0.3,1) 0.3s forwards;
        }

        @keyframes slideRight {
            to { opacity: 1; transform: translateX(0); }
        }

        /* Detalhe gráfico — número grande no fundo */
        .s4-bg-num {
            position: absolute;
            right: -10px;
            bottom: 60px;
            font-size: 200px;
            font-weight: 900;
            line-height: 1;
            color: var(--cor-destaque);
            opacity: 0.04;
            pointer-events: none;
            animation: fadeUp 1s ease-out 0.4s forwards;
            -webkit-text-stroke: 2px var(--cor-destaque);
            color: transparent;
        }

        /* =============================================
           SLIDE 5 — MACROS
           ============================================= */
        #slide-5 {
            background: var(--cor-fundo);
            padding: 0 36px;
            align-items: flex-start;
        }

        .s5-label {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--cor-destaque);
            opacity: 0;
            animation: fadeUp 0.4s ease-out 0.1s forwards;
            margin-bottom: 20px;
        }

        .s5-macros {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        .s5-macro-item {
            display: flex;
            align-items: center;
            gap: 12px;
            opacity: 0;
            transform: translateX(-24px);
        }
        .s5-macro-item:nth-child(1) { animation: slideRight 0.6s cubic-bezier(0.16,1,0.3,1) 0.2s forwards; }
        .s5-macro-item:nth-child(2) { animation: slideRight 0.6s cubic-bezier(0.16,1,0.3,1) 0.35s forwards; }
        .s5-macro-item:nth-child(3) { animation: slideRight 0.6s cubic-bezier(0.16,1,0.3,1) 0.5s forwards; }
        .s5-macro-item:nth-child(4) { animation: slideRight 0.6s cubic-bezier(0.16,1,0.3,1) 0.65s forwards; }

        .s5-macro-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--cor-destaque);
            flex-shrink: 0;
        }

        .s5-macro-text {
            font-size: 15px;
            font-weight: 400;
            color: var(--cor-texto-principal);
            letter-spacing: 0.2px;
        }

        /* =============================================
           SLIDE 6 — CTA FINAL
           ============================================= */
        #slide-6 {
            background: var(--cor-fundo);
            align-items: center;
            justify-content: center;
        }

        /* Grande texto de fundo */
        .s6-bg-cta {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            pointer-events: none;
        }
        .s6-bg-word {
            font-size: 72px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -3px;
            -webkit-text-stroke: 1px var(--cor-destaque);
            color: transparent;
            opacity: 0;
            white-space: nowrap;
            animation: bgWordReveal2 1.2s ease-out 0.1s forwards;
        }
        @keyframes bgWordReveal2 {
            to { opacity: 0.06; }
        }

        .s6-content {
            position: relative;
            z-index: 2;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .s6-logo {
            max-width: 130px;
            max-height: 65px;
            object-fit: contain;
            opacity: 0;
            transform: scale(0.85);
            animation: logoReveal 0.8s cubic-bezier(0.16,1,0.3,1) 0.2s forwards;
            filter: drop-shadow(0 6px 20px rgba(0,0,0,0.15));
        }

        .s6-divider {
            width: 0; height: 1px;
            background: var(--cor-destaque);
            opacity: 0.5;
            animation: lineGrow3 0.7s ease-out 0.6s forwards;
        }
        @keyframes lineGrow3 { to { width: 80px; } }

        .s6-cta {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--cor-texto-principal);
            opacity: 0;
            animation: fadeUp 0.6s ease-out 0.75s forwards;
        }

        .s6-sub {
            font-size: 10px;
            font-weight: 300;
            letter-spacing: 1.5px;
            color: var(--cor-destaque-secundaria);
            opacity: 0;
            animation: fadeUp 0.6s ease-out 0.95s forwards;
        }

        /* Ponto pulsante decorativo */
        .s6-pulse {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: var(--cor-destaque);
            opacity: 0;
            animation: fadeUp 0.4s ease-out 1.1s forwards,
                       pulse 1.2s ease-in-out 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.5); opacity: 0.3; }
        }

        /* =============================================
           BARRA DE PROGRESSO
           ============================================= */
        #progress-bar {
            position: absolute;
            bottom: 28px;
            left: 0;
            height: 2px;
            background: var(--cor-destaque);
            opacity: 0.6;
            z-index: 95;
            width: 0%;
            transition: width linear;
        }

        /* Indicadores de slide (bolinhas) */
        #slide-dots {
            position: absolute;
            bottom: 36px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            z-index: 95;
        }
        .dot {
            width: 4px; height: 4px;
            border-radius: 50%;
            background: var(--cor-destaque-secundaria);
            opacity: 0.3;
            transition: opacity 0.3s, width 0.3s;
        }
        .dot.active {
            opacity: 0.8;
            width: 16px;
            border-radius: 2px;
        }

        /* =============================================
           UTILITÁRIOS DE ANIMAÇÃO
           ============================================= */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

<div id="stage">

    <!-- Barras letterbox cinematográficas -->
    <div class="letterbox letterbox-top"></div>
    <div class="letterbox letterbox-bottom"></div>

    <!-- Barra de progresso -->
    <div id="progress-bar"></div>

    <!-- Indicadores -->
    <div id="slide-dots">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>

    <!-- ==================
         SLIDE 1 — ABERTURA
         ================== -->
    <div class="slide active entering" id="slide-1">
        <div class="s1-bg-text">
            <span class="s1-bg-word">CHAVE_NOME_EMPRESA</span>
        </div>
        <div class="s1-logo-wrap">
            <img src="CHAVE_LOGO" alt="Logo" class="s1-logo">
            <div class="s1-line"></div>
            <span class="s1-tagline">CHAVE_NOME_EMPRESA</span>
        </div>
    </div>

    <!-- ==================
         SLIDE 2 — FOTO HERO
         ================== -->
    <div class="slide" id="slide-2">
        <div class="s2-img-container">
            <img src="CHAVE_IMAGEM" alt="Prato">
            <div class="s2-brand-tag">CHAVE_NOME_EMPRESA</div>
        </div>
    </div>

    <!-- ==================
         SLIDE 3 — TÍTULO
         ================== -->
    <div class="slide" id="slide-3">
        <span class="s3-eyebrow">Prato do dia</span>
        <h1 class="s3-title" id="s3-title-text">
            <!-- JS vai quebrar CHAVE_TITULO em palavras -->
        </h1>
        <div class="s3-line"></div>
    </div>

    <!-- ==================
         SLIDE 4 — INGREDIENTES
         ================== -->
    <div class="slide" id="slide-4">
        <div class="s4-bg-num">4</div>
        <span class="s4-label">Ingredientes</span>
        <p class="s4-ingredients" id="s4-ingredients-text">CHAVE_INGREDIENTES</p>
    </div>

    <!-- ==================
         SLIDE 5 — MACROS
         ================== -->
    <div class="slide" id="slide-5">
        <span class="s5-label">Informações</span>
        <div class="s5-macros" id="s5-macros-container">
            <!-- JS insere CHAVE_MACROS como itens -->
            CHAVE_MACROS
        </div>
    </div>

    <!-- ==================
         SLIDE 6 — CTA FINAL
         ================== -->
    <div class="slide" id="slide-6">
        <div class="s6-bg-cta">
            <span class="s6-bg-word">CHAVE_NOME_EMPRESA</span>
        </div>
        <div class="s6-content">
            <img src="CHAVE_LOGO" alt="Logo" class="s6-logo">
            <div class="s6-divider"></div>
            <span class="s6-cta" id="s6-cta-text">CHAVE_CTA</span>
            <span class="s6-sub">CHAVE_NOME_EMPRESA</span>
            <div class="s6-pulse"></div>
        </div>
    </div>

</div>

<script>
    /* =====================================================
       MOTOR DE SLIDES — automático, cinematográfico
       ===================================================== */

    const SLIDE_DURATION = 2800;  // ms por slide
    const TRANSITION_MS  = 700;   // ms da animação CSS

    const slides = Array.from(document.querySelectorAll('.slide'));
    const dots   = Array.from(document.querySelectorAll('.dot'));
    const bar    = document.getElementById('progress-bar');
    let current  = 0;
    let timer    = null;

    /* — Quebra o título em palavras para o slide 3 — */
    const titleEl = document.getElementById('s3-title-text');
    const rawTitle = titleEl ? titleEl.textContent.trim() : '';
    if (titleEl && rawTitle && !rawTitle.includes('CHAVE')) {
        titleEl.innerHTML = '';
        rawTitle.split(' ').forEach(w => {
            const span = document.createElement('span');
            span.className = 'word';
            span.textContent = w;
            titleEl.appendChild(span);
        });
    } else if (titleEl) {
        /* fallback para quando a CHAVE ainda não foi substituída */
        titleEl.innerHTML = '<span class="word">CHAVE_TITULO</span>';
    }

    /* — Barra de progresso — */
    function startBar() {
        bar.style.transition = 'none';
        bar.style.width = '0%';
        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                bar.style.transition = `width ${SLIDE_DURATION}ms linear`;
                bar.style.width = '100%';
            });
        });
    }

    /* — Atualiza dots — */
    function updateDots(idx) {
        dots.forEach((d, i) => d.classList.toggle('active', i === idx));
    }

    /* — Reinicia animações internas do slide — */
    function restartAnimations(slide) {
        const animated = slide.querySelectorAll('[style*="animation"], *');
        animated.forEach(el => {
            el.style.animation = 'none';
            void el.offsetHeight; // reflow
            el.style.animation = '';
        });
    }

    /* — Transição principal — */
    function goTo(next) {
        if (next === current) return;

        const leaving  = slides[current];
        const entering = slides[next];

        leaving.classList.remove('entering');
        leaving.classList.add('leaving');

        setTimeout(() => {
            leaving.classList.remove('active', 'leaving');
            entering.classList.add('active', 'entering');
            restartAnimations(entering);
            setTimeout(() => entering.classList.remove('entering'), TRANSITION_MS);

            current = next;
            updateDots(current);
            startBar();
        }, TRANSITION_MS);
    }

    /* — Loop automático — */
    function advance() {
        const next = (current + 1) % slides.length;
        goTo(next);
    }

    function startLoop() {
        clearInterval(timer);
        timer = setInterval(advance, SLIDE_DURATION);
    }

    /* — Inicia — */
    updateDots(0);
    startBar();
    startLoop();

    /* — Pausa ao tocar/clicar (UX) — */
    document.getElementById('stage').addEventListener('click', () => {
        clearInterval(timer);
        advance();
        startLoop();
    });
</script>

</body>
</html>
