<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Apresentação Comercial</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --cor-fundo: CHAVE_COR_FUNDO;
            --cor-texto-principal: CHAVE_COR_TEXTO;
            --cor-destaque: CHAVE_COR_DESTAQUE;
            --cor-destaque-secundaria: CHAVE_COR_SECUNDARIA;
            --fonte-principal: 'Figtree', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--cor-fundo);
            color: var(--cor-texto-principal);
            font-family: var(--fonte-principal);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* ============================================
           CONTAINER — 400x500px FIXO
           Tudo dentro usa position:absolute com px
           para o html2canvas calcular corretamente
           ============================================ */
        .template-container {
            width: 400px;
            height: 500px;
            background-color: var(--cor-fundo);
            position: relative;
            overflow: hidden;
        }

        /* Gradiente decorativo — cores fixas, sem var() no background-image */
        .bg-deco {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 80% 10%, rgba(0,87,255,0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 10% 90%, rgba(0,87,255,0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* ============================================
           HEADER — top:0, height:42px
           ============================================ */
        .template-header {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 42px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 18px;
            z-index: 10;
        }

        .cliente-logo {
            max-width: 90px;
            max-height: 26px;
            object-fit: contain;
            display: block;
        }

        .header-badge {
            font-size: 8px;
            font-weight: 700;
            letter-spacing: 1.3px;
            text-transform: uppercase;
            color: var(--cor-destaque);
            border: 1px solid var(--cor-destaque);
            border-radius: 20px;
            padding: 3px 9px;
            opacity: 0.7;
        }

        /* ============================================
           NOTEBOOK — top:46px, height:268px
           ============================================ */
        .notebook-area {
            position: absolute;
            top: 46px;
            left: 18px; right: 18px;
            height: 268px;
            z-index: 5;
        }

        /* Tampa/tela — ocupa quase tudo */
        .macbook-lid {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 252px;
            background: #1c1c20;
            border-radius: 10px 10px 0 0;
            padding: 8px 6px 0 6px;
            box-shadow:
                inset 0 2px 0 #3c3c44,
                inset 0 -1px 0 #111,
                0 0 0 1px #2c2c34,
                0 12px 40px rgba(0,0,0,0.30),
                0 3px 10px rgba(0,0,0,0.18);
        }

        .macbook-camera {
            width: 100%;
            height: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 4px;
        }
        .macbook-camera-dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: #2a2a30;
            box-shadow: 0 0 0 1px #1e1e24;
        }

        /* Tela interna: lid(252) - padding-top(8) - camera(14) = 230px */
        .macbook-screen {
            width: 100%;
            height: 230px;
            border-radius: 3px;
            overflow: hidden;
            background: #06060e;
            position: relative;
        }

        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .screen-glare {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                130deg,
                rgba(255,255,255,0.05) 0%,
                transparent 45%,
                rgba(0,0,0,0.04) 100%
            );
            pointer-events: none;
        }

        /* Base */
        .macbook-base {
            position: absolute;
            top: 252px; left: 0; right: 0;
            height: 9px;
            background: linear-gradient(to bottom, #b8b8c0, #d0d0d8);
            border-radius: 0 0 3px 3px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.18);
        }
        .macbook-base::after {
            content: '';
            position: absolute;
            bottom: 0; left: 50%;
            transform: translateX(-50%);
            width: 26%; height: 3px;
            background: #a0a0a8;
            border-radius: 2px 2px 0 0;
        }

        /* Pé */
        .macbook-foot {
            position: absolute;
            top: 261px; left: -1%; right: -1%;
            height: 7px;
            background: linear-gradient(to bottom, #909098, #b0b0b8);
            border-radius: 0 0 4px 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.14);
        }

        /* Reflexo embaixo */
        .notebook-glow {
            position: absolute;
            top: 255px; left: 10%; right: 10%;
            height: 12px;
            background: radial-gradient(ellipse, rgba(0,87,255,0.10) 0%, transparent 70%);
            border-radius: 50%;
        }

        /* ============================================
           TEXTO — top: 322px (46+268+8)
           ============================================ */
        .text-area {
            position: absolute;
            top: 322px;
            left: 18px; right: 18px;
            z-index: 10;
        }

        .dish-title {
            font-size: 14px;
            font-weight: 800;
            color: var(--cor-texto-principal);
            letter-spacing: -0.3px;
            line-height: 1.2;
            margin-bottom: 5px;
        }

        .ingredients-list {
            font-size: 11px;
            font-weight: 400;
            color: var(--cor-destaque-secundaria);
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .macros-info {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        .macro-tag {
            font-size: 8px;
            font-weight: 700;
            letter-spacing: 0.7px;
            text-transform: uppercase;
            color: var(--cor-destaque);
            border: 1px solid var(--cor-destaque);
            padding: 2px 8px;
            border-radius: 20px;
            opacity: 0.75;
        }

        /* ============================================
           DIVISOR + FOOTER — bottom fixo
           ============================================ */
        .divider {
            position: absolute;
            bottom: 28px;
            left: 18px; right: 18px;
            height: 1px;
            background: linear-gradient(to right, rgba(0,87,255,0.20), transparent);
            z-index: 10;
        }

        .template-footer {
            position: absolute;
            bottom: 10px;
            left: 18px; right: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .cta-text {
            font-size: 10px;
            font-weight: 500;
            color: var(--cor-destaque-secundaria);
            letter-spacing: 0.2px;
        }

        .footer-dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--cor-destaque);
            opacity: 0.4;
        }

    </style>
</head>
<body>

<div class="template-container">

    <!-- decoração de fundo -->
    <div class="bg-deco"></div>

    <!-- HEADER -->
    <header class="template-header">
        <img
            src="CHAVE_LOGO"
            alt="Logo"
            class="cliente-logo"
            crossorigin="anonymous"
            onerror="this.style.display='none'"
        >
        <span class="header-badge">White Label Marketing</span>
    </header>

    <!-- NOTEBOOK -->
    <div class="notebook-area">
        <div class="macbook-lid">
            <div class="macbook-camera">
                <div class="macbook-camera-dot"></div>
            </div>
            <div class="macbook-screen">
                <img
                    src="CHAVE_IMAGEM"
                    class="product-image"
                    alt="Produto"
                    crossorigin="anonymous"
                    onerror="this.style.visibility='hidden'"
                >
                <div class="screen-glare"></div>
            </div>
        </div>
        <div class="macbook-base"></div>
        <div class="macbook-foot"></div>
        <div class="notebook-glow"></div>
    </div>

    <!-- TEXTOS -->
    <div class="text-area">
        <h1 class="dish-title" id="dish-title-text">CHAVE_TITULO</h1>
        <p class="ingredients-list" id="ingredients-list-text">CHAVE_INGREDIENTES</p>
        <div class="macros-info" id="macros-info-tags">CHAVE_MACROS</div>
    </div>

    <!-- DIVISOR -->
    <div class="divider"></div>

    <!-- FOOTER -->
    <footer class="template-footer">
        <span class="cta-text" id="cta-footer-text">CHAVE_CTA</span>
        <div class="footer-dot"></div>
    </footer>

</div>

<script>
    /* Esconde elementos com chave crua não substituída pelo Flask */
    (function() {
        var chave = /^CHAVE_/;
        ['dish-title-text','ingredients-list-text','cta-footer-text'].forEach(function(id) {
            var el = document.getElementById(id);
            if (el && chave.test(el.textContent.trim())) el.style.display = 'none';
        });
        var m = document.getElementById('macros-info-tags');
        if (m && chave.test(m.innerHTML.trim())) m.style.display = 'none';
    })();
</script>

</body>
</html>
