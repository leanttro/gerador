<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Leanttro Mockup 4:3</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --cor-fundo: CHAVE_COR_FUNDO;
            --cor-texto-principal: CHAVE_COR_TEXTO;
            --cor-destaque: CHAVE_COR_DESTAQUE;
            --cor-destaque-secundaria: CHAVE_COR_SECUNDARIA;
            --fonte-principal: 'Montserrat', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--cor-fundo);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: var(--fonte-principal);
        }

        .template-container {
            width: 420px;
            min-height: 520px;
            background-color: var(--cor-fundo);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
        }

        .template-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            position: relative;
            z-index: 10;
        }

        .cliente-logo {
            max-height: 16px;
            object-fit: contain;
        }

        .badge-comercial {
            font-size: 9px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--cor-destaque);
            border: 1px solid var(--cor-destaque);
            background-color: transparent;
            padding: 6px 12px;
            border-radius: 20px;
        }

        .laptop-wrapper {
            position: relative;
            width: 90%;
            margin: 0 auto 35px auto;
            z-index: 5;
            animation: float 4s ease-in-out infinite;
        }

        .laptop-wrapper::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--cor-destaque);
            filter: blur(45px);
            opacity: 0.15;
            top: 10%;
            left: 0;
            z-index: -1;
            border-radius: 50%;
        }

        .laptop-frame {
            background-color: #1a1a1a;
            border-radius: 10px 10px 0 0;
            padding: 4% 4% 5% 4%;
            box-shadow: inset 0 0 0 1px #333;
            position: relative;
        }

        .laptop-screen {
            background-color: #ffffff;
            aspect-ratio: 4 / 3;
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .main-product-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top;
            display: block;
        }

        .laptop-base {
            width: 114%;
            height: 8px;
            background: linear-gradient(to bottom, #d6d6d6 0%, #b3b3b3 100%);
            margin-left: -7%;
            border-radius: 0 0 8px 8px;
            position: relative;
            box-shadow: 0 8px 15px rgba(0,0,0,0.15);
        }

        .laptop-base::after {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 18%;
            height: 3px;
            background-color: #999;
            border-radius: 0 0 4px 4px;
        }

        .text-details {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .dish-title {
            font-size: 18px;
            font-weight: 800;
            color: var(--cor-texto-principal);
            letter-spacing: -0.5px;
            line-height: 1.2;
        }

        .ingredients-list {
            font-size: 12px;
            font-weight: 500;
            color: var(--cor-destaque-secundaria);
            line-height: 1.5;
        }

        .macros-info {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 5px;
        }

        .macro-tag {
            font-size: 9px;
            font-weight: 700;
            color: var(--cor-destaque);
            border: 1px solid rgba(0,0,0,0.08); /* Ajustado para simular o azul clarinho caso a key traga apenas texto, mas herda cor */
            background-color: transparent;
            border-color: var(--cor-destaque);
            padding: 6px 14px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .divider {
            width: 100%;
            height: 1px;
            background-color: var(--cor-destaque-secundaria);
            opacity: 0.2;
            margin: auto 0 16px 0;
        }

        .template-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 4px;
        }

        .cta-text {
            font-size: 11px;
            font-weight: 600;
            color: var(--cor-destaque-secundaria);
        }

        .footer-dot {
            width: 5px;
            height: 5px;
            background-color: var(--cor-destaque);
            border-radius: 50%;
            opacity: 0.6;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-4px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body>

    <div class="template-container" id="fit-marmita-app">
        
        <header class="template-header" id="logo-container">
            <img src="CHAVE_LOGO" alt="Logo Leanttro" class="cliente-logo" id="client-logo-img">
            <div class="badge-comercial">Apresentação Comercial</div>
        </header>

        <div class="laptop-wrapper">
            <div class="laptop-frame">
                <div class="laptop-screen" id="video-scene">
                    <img src="CHAVE_IMAGEM" id="main-product-video" class="main-product-video" alt="Produto">
                </div>
            </div>
            <div class="laptop-base"></div>
        </div>

        <div class="text-details" id="text-details-container">
            <h1 class="dish-title" id="dish-title-text">CHAVE_TITULO</h1>
            
            <p class="ingredients-list" id="ingredients-list-text">
                CHAVE_INGREDIENTES
            </p>

            <div class="macros-info" id="macros-info-tags">
                CHAVE_MACROS
            </div>
        </div>

        <div class="divider"></div>

        <footer class="template-footer" id="footer-container">
            <span class="cta-text" id="cta-footer-text">CHAVE_CTA</span>
            <div class="footer-dot"></div>
        </footer>

    </div>

    <script>
        // Mantido limpo para a injeção via backend Leanttro
    </script>

</body>
</html>
