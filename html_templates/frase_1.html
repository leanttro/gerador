<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Template Frase Sobreposição</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --cor-texto: CHAVE_COR_TEXTO;
            --cor-destaque: CHAVE_COR_DESTAQUE;
            --cor-secundaria: CHAVE_COR_SECUNDARIA;
            --cor-overlay: CHAVE_COR_TRANSPARENTE;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body {
            font-family: 'Montserrat', sans-serif;
            color: var(--cor-texto);
            display: flex; justify-content: center; align-items: center;
            position: relative;
        }
        /* Background image */
        .bg {
            position: absolute; inset: 0;
            background-image: url(CHAVE_IMAGEM);
            background-size: cover; background-position: center;
            z-index: 0;
        }
        /* Overlay escuro */
        .overlay {
            position: absolute; inset: 0;
            background: var(--cor-overlay);
            z-index: 1;
        }
        /* Gradiente inferior */
        .gradient-bottom {
            position: absolute; bottom: 0; left: 0; right: 0;
            height: 50%;
            background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 100%);
            z-index: 2;
        }
        .container {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: space-between;
            padding: 7% 9%;
            position: relative; z-index: 10;
        }
        header {
            display: flex; justify-content: flex-start;
        }
        .logo { max-width: 130px; max-height: 50px; object-fit: contain; }
        main {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; padding: 5% 0;
        }
        /* Linha decorativa antes da frase */
        .linha {
            width: clamp(30px, 8vw, 50px); height: 3px;
            background: var(--cor-destaque); margin-bottom: 5%;
        }
        .quote-block {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(22px, 7.5vw, 50px);
            font-weight: 800;
            line-height: 1.2;
            color: var(--cor-texto);
        }
        /* Palavra em destaque */
        .destaque {
            background: var(--cor-destaque);
            color: #000;
            padding: 0 8px 2px;
            display: inline;
            font-style: normal;
        }
        .quote-parte-1 { display: block; margin-bottom: 0.1em; }
        .quote-parte-2 { display: block; }
        .autor {
            margin-top: 6%;
            font-size: clamp(10px, 2.6vw, 15px);
            font-weight: 600; color: rgba(255,255,255,0.6);
            letter-spacing: 1.5px; text-transform: uppercase;
        }
        footer {
            display: flex; justify-content: space-between; align-items: center;
        }
        .cta {
            font-size: clamp(9px, 2.3vw, 13px); font-weight: 700;
            color: var(--cor-secundaria); letter-spacing: 2px;
            text-transform: uppercase;
        }
        .footer-line {
            width: 30px; height: 2px; background: var(--cor-destaque);
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="overlay"></div>
    <div class="gradient-bottom"></div>

    <div class="container">
        <header>
            <img src="CHAVE_LOGO" alt="Logo" class="logo">
        </header>
        <main>
            <div class="linha"></div>
            <div class="quote-block">
                <span class="quote-parte-1">CHAVE_FRASE_ANTES</span>
                <span class="quote-parte-2">
                    <mark class="destaque">CHAVE_PALAVRA_DESTAQUE</mark>
                    CHAVE_FRASE_DEPOIS
                </span>
            </div>
            <p class="autor">— CHAVE_AUTOR</p>
        </main>
        <footer>
            <span class="cta">CHAVE_CTA</span>
            <div class="footer-line"></div>
        </footer>
    </div>
</body>
</html>
