<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Cinematico 3D Slides</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --cor-fundo: CHAVE_COR_FUNDO;
            --cor-texto-principal: CHAVE_COR_TEXTO;
            --cor-destaque: CHAVE_COR_DESTAQUE;
            --fonte-principal: 'Montserrat', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--cor-fundo);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .template-motion-container[data-ratio="4:5"]  { width: 400px; height: 500px; }
        .template-motion-container[data-ratio="1:1"]  { width: 500px; height: 500px; }
        .template-motion-container[data-ratio="9:16"] { width: 405px; height: 720px; }
        
        .template-motion-container {
            background-color: #000;
            position: relative;
            overflow: hidden;
            perspective: 1200px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }
        
        .slide {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            opacity: 0;
            transform-origin: center center -100px;
            backface-visibility: hidden;
            transform-style: preserve-3d;
            animation: slide3D 12s infinite cubic-bezier(0.25, 1, 0.5, 1);
        }
        
        .slide-1 { animation-delay: 0s; }
        .slide-2 { animation-delay: 4s; }
        .slide-3 { animation-delay: 8s; }

        @keyframes slide3D {
            0% { opacity: 0; transform: rotateY(90deg) scale(0.9); z-index: 1; }
            8% { opacity: 1; transform: rotateY(0deg) scale(1.0); z-index: 10; }
            25% { opacity: 1; transform: rotateY(0deg) scale(1.12); z-index: 10; }
            33% { opacity: 0; transform: rotateY(-90deg) scale(0.9); z-index: 1; }
            100% { opacity: 0; }
        }

        .bg-image {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6;
            z-index: 0;
        }
        
        .content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            height: 100%;
            padding: 40px 24px 60px;
            background: linear-gradient(to top, var(--cor-fundo) 5%, transparent 60%);
        }
        
        .logo {
            position: absolute;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            max-width: 160px;
            max-height: 50px;
            z-index: 20;
            object-fit: contain;
        }
        
        .title {
            font-family: var(--fonte-principal);
            font-size: 32px;
            font-weight: 900;
            color: var(--cor-destaque);
            text-transform: uppercase;
            line-height: 1.05;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }
        
        .desc {
            font-family: var(--fonte-principal);
            font-size: 15px;
            font-weight: 400;
            color: var(--cor-texto-principal);
            line-height: 1.4;
            opacity: 0.9;
        }
        
        .cta-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--cor-destaque);
            color: var(--cor-fundo);
            text-align: center;
            padding: 14px;
            font-family: var(--fonte-principal);
            font-weight: 900;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            z-index: 20;
        }
    </style>
</head>
<body>
    <div class="template-motion-container" data-ratio="CHAVE_PROPORCAO">
        
        <img src="CHAVE_LOGO" alt="Logo" class="logo">
        
        <div class="slide slide-1">
            <img src="CHAVE_IMAGEM_1" class="bg-image">
            <div class="content">
                <h1 class="title">CHAVE_TITULO_1</h1>
                <p class="desc">CHAVE_TEXTO_1</p>
            </div>
        </div>

        <div class="slide slide-2">
            <img src="CHAVE_IMAGEM_2" class="bg-image">
            <div class="content">
                <h1 class="title">CHAVE_TITULO_2</h1>
                <p class="desc">CHAVE_TEXTO_2</p>
            </div>
        </div>

        <div class="slide slide-3">
            <img src="CHAVE_IMAGEM_3" class="bg-image">
            <div class="content">
                <h1 class="title">CHAVE_TITULO_3</h1>
                <p class="desc">CHAVE_TEXTO_3</p>
            </div>
        </div>

        <div class="cta-bar">CHAVE_CTA</div>
        
    </div>
</body>
</html>
