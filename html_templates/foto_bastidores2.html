<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Bastidores</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --cor-fundo: CHAVE_COR_FUNDO;
            --cor-texto-principal: CHAVE_COR_TEXTO;
            --cor-destaque: CHAVE_COR_DESTAQUE;
            --cor-destaque-secundaria: CHAVE_COR_SECUNDARIA;
            --fonte-principal: 'Montserrat', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--cor-fundo);
            color: var(--cor-texto-principal);
            font-family: var(--fonte-principal);
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* ==============================
           CONTAINER PRINCIPAL — 100% viewport
           Funciona em 4:5 (1080x1350) e 9:16 (1080x1920)
           ============================== */
        .container {
            width: 100vw;
            height: 100vh;
            background-color: var(--cor-fundo);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
            padding: clamp(12px, 3vw, 28px) clamp(16px, 5vw, 36px);
        }

        /* Linha dourada topo */
        .top-line {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: clamp(2px, 0.4vh, 4px);
            background: var(--cor-destaque);
        }

        /* ==============================
           HEADER — LOGO
           ============================== */
        .header {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-top: clamp(8px, 2vh, 18px);
            padding-bottom: clamp(8px, 1.8vh, 16px);
            flex-shrink: 0;
        }

        .logo {
            max-width: clamp(80px, 28vw, 160px);
            max-height: clamp(36px, 9vh, 70px);
            object-fit: contain;
        }

        /* ==============================
           CARD DA IMAGEM
           ============================== */
        .image-card {
            width: 100%;
            flex-shrink: 0;
            border-radius: clamp(10px, 2.5vw, 18px);
            overflow: hidden;
            position: relative;
            height: clamp(140px, 32vh, 300px);
        }

        .image-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Badge sobre o card */
        .card-badge {
            position: absolute;
            top: clamp(8px, 2vw, 14px);
            left: clamp(8px, 2vw, 14px);
            background: var(--cor-destaque);
            color: #fff;
            font-size: clamp(7px, 1.6vw, 10px);
            font-weight: 700;
            letter-spacing: 1.8px;
            text-transform: uppercase;
            padding: clamp(3px, 0.6vh, 5px) clamp(8px, 2vw, 12px);
            border-radius: 4px;
        }

        /* ==============================
           BLOCO TÍTULO + SUBTÍTULO
           ============================== */
        .text-block {
            width: 100%;
            padding-top: clamp(10px, 2.5vh, 22px);
            padding-bottom: clamp(6px, 1.5vh, 14px);
            flex-shrink: 0;
        }

        .titulo {
            font-size: clamp(14px, 4.5vw, 24px);
            font-weight: 900;
            color: var(--cor-texto-principal);
            text-transform: uppercase;
            letter-spacing: -0.3px;
            line-height: 1.15;
            margin-bottom: clamp(4px, 1vh, 8px);
        }

        .subtitulo {
            font-size: clamp(9px, 2.2vw, 13px);
            font-weight: 400;
            color: var(--cor-destaque-secundaria);
            line-height: 1.5;
        }

        /* ==============================
           ETAPAS NUMERADAS
           ============================== */
        .etapas {
            width: 100%;
            display: flex;
            gap: clamp(6px, 2vw, 14px);
            flex-shrink: 0;
            padding-bottom: clamp(8px, 2vh, 18px);
        }

        .etapa {
            flex: 1;
            border: 1.5px solid var(--cor-destaque);
            border-radius: clamp(6px, 1.5vw, 10px);
            padding: clamp(8px, 2vh, 14px) clamp(6px, 1.5vw, 10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(3px, 0.8vh, 6px);
        }

        .etapa-num {
            font-size: clamp(13px, 3.5vw, 20px);
            font-weight: 900;
            color: var(--cor-destaque);
            line-height: 1;
        }

        .etapa-label {
            font-size: clamp(7px, 1.7vw, 10px);
            font-weight: 700;
            color: var(--cor-texto-principal);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            text-align: center;
            line-height: 1.3;
        }

        /* ==============================
           DIVIDER
           ============================== */
        .divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(to right, var(--cor-destaque), transparent);
            opacity: 0.2;
            flex-shrink: 0;
            margin-bottom: clamp(8px, 2vh, 16px);
        }

        /* ==============================
           FRASE HUMANA
           ============================== */
        .frase-block {
            width: 100%;
            flex-shrink: 0;
            padding-bottom: clamp(8px, 2vh, 16px);
        }

        .aspas {
            font-size: clamp(22px, 6vw, 38px);
            color: var(--cor-destaque);
            line-height: 0.6;
            display: block;
            margin-bottom: clamp(4px, 1vh, 8px);
            opacity: 0.6;
        }

        .frase-texto {
            font-size: clamp(9px, 2.2vw, 12px);
            font-weight: 400;
            font-style: italic;
            color: var(--cor-texto-principal);
            line-height: 1.55;
            margin-bottom: clamp(6px, 1.2vh, 10px);
        }

        .frase-autor {
            font-size: clamp(8px, 1.8vw, 10px);
            font-weight: 700;
            letter-spacing: 1.8px;
            text-transform: uppercase;
            color: var(--cor-destaque);
        }

        /* ==============================
           CTA RODAPÉ
           ============================== */
        .footer {
            width: 100%;
            margin-top: auto;
            padding-top: clamp(6px, 1.5vh, 12px);
            border-top: 1px solid rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            gap: clamp(8px, 2vw, 14px);
            flex-shrink: 0;
        }

        .cta-text {
            font-size: clamp(8px, 1.8vw, 11px);
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--cor-destaque-secundaria);
        }

        .cta-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, var(--cor-destaque), transparent);
            opacity: 0.25;
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="top-line"></div>

        <!-- LOGO -->
        <header class="header">
            <img src="CHAVE_LOGO" alt="Logo" class="logo">
        </header>

        <!-- CARD IMAGEM -->
        <div class="image-card">
            <img src="CHAVE_IMAGEM" alt="Bastidores">
            <div class="card-badge">Bastidores</div>
        </div>

        <!-- TÍTULO + SUBTÍTULO -->
        <div class="text-block">
            <h1 class="titulo">CHAVE_TITULO</h1>
            <p class="subtitulo">CHAVE_SUBTITULO</p>
        </div>

        <!-- ETAPAS -->
        <div class="etapas">
            <div class="etapa">
                <span class="etapa-num">01</span>
                <span class="etapa-label">CHAVE_ETAPA_1</span>
            </div>
            <div class="etapa">
                <span class="etapa-num">02</span>
                <span class="etapa-label">CHAVE_ETAPA_2</span>
            </div>
            <div class="etapa">
                <span class="etapa-num">03</span>
                <span class="etapa-label">CHAVE_ETAPA_3</span>
            </div>
        </div>

        <div class="divider"></div>

        <!-- FRASE HUMANA -->
        <div class="frase-block">
            <span class="aspas">"</span>
            <p class="frase-texto">CHAVE_FRASE_HUMANA</p>
            <span class="frase-autor">— CHAVE_AUTOR_FRASE</span>
        </div>

        <!-- CTA RODAPÉ -->
        <footer class="footer">
            <span class="cta-text">CHAVE_CTA</span>
            <div class="cta-line"></div>
        </footer>

    </div>

</body>
</html>
