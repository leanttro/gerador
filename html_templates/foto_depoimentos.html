<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Depoimento Print</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --cor-fundo: CHAVE_COR_FUNDO;
            --cor-texto-principal: CHAVE_COR_TEXTO;
            --cor-destaque: CHAVE_COR_DESTAQUE;
            --cor-destaque-secundaria: CHAVE_COR_SECUNDARIA;
            --fonte-principal: 'Montserrat', sans-serif;
            --velocidade-animacao-fast: 0.25s;
            --velocidade-animacao-normal: 0.5s;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--cor-fundo);
            background-image: linear-gradient(to bottom, rgba(255,255,255,0.02) 0%, rgba(0,0,0,0.6) 100%);
            color: var(--cor-texto-principal);
            font-family: var(--fonte-principal);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .template-motion-container[data-ratio="4:5"]  { width: 400px; height: 500px; }
        .template-motion-container[data-ratio="1:1"]  { width: 500px; height: 500px; }
        .template-motion-container[data-ratio="9:16"] { width: 405px; height: 720px; }

        .template-motion-container {
            background-color: var(--cor-fundo);
            background-image: linear-gradient(to bottom, rgba(255,255,255,0.02) 0%, rgba(0,0,0,0.6) 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .side-line {
            position: absolute;
            left: 0; top: 0;
            width: 3px; height: 100%;
            background: linear-gradient(to bottom, transparent 0%, var(--cor-destaque) 30%, var(--cor-destaque) 70%, transparent 100%);
            opacity: 0.35;
            z-index: 1;
            animation: fadeInTop 0.8s ease-out forwards;
        }

        .template-header {
            width: 100%;
            min-height: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 80px 20px 5px;
            position: relative;
            z-index: 10;
            animation: fadeInTop var(--velocidade-animacao-fast) ease-out forwards;
        }

        .cliente-logo {
            max-width: 200px;
            max-height: 65px;
            object-fit: contain;
        }

        .template-main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 24px;
            margin-top: -80px;
            position: relative;
            z-index: 10;
        }

        .testimonial-card {
            background-color: rgba(0,0,0,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            position: relative;
            box-shadow: 0 8px 32px rgba(0,0,0,0.05);
            animation: fadeInFast var(--velocidade-animacao-normal) ease-out forwards,
                       bob 4s ease-in-out infinite alternate 1s;
        }

        .template-motion-container[data-ratio="9:16"] .testimonial-card { 
            padding: 28px; 
            margin-bottom: 20px;
        }

        .quote-icon {
            font-size: 60px;
            font-family: Georgia, serif;
            color: var(--cor-destaque);
            opacity: 0.2;
            position: absolute;
            top: -10px;
            left: 16px;
            line-height: 1;
            pointer-events: none;
            animation: pulseFast 2s ease-in-out infinite alternate;
        }

        .testimonial-text {
            font-size: 14px;
            font-weight: 600;
            font-style: italic;
            line-height: 1.4;
            color: var(--cor-texto-principal);
            margin-bottom: 16px;
            position: relative;
            z-index: 2;
            letter-spacing: -0.2px;
            opacity: 0;
            animation: fadeInText var(--velocidade-animacao-fast) ease-out calc(var(--velocidade-animacao-normal) + 0.1s) forwards;
        }

        .template-motion-container[data-ratio="9:16"] .testimonial-text { 
            font-size: 17px; 
            margin-bottom: 24px;
        }

        .print-wrapper {
            width: 100%;
            height: auto;
            max-height: 200px;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid rgba(0,0,0,0.05);
            margin-bottom: 16px;
            opacity: 0;
            background-color: transparent;
            animation: fadeInTop var(--velocidade-animacao-fast) ease-out calc(var(--velocidade-animacao-normal) + 0.2s) forwards;
        }

        .template-motion-container[data-ratio="9:16"] .print-wrapper { 
            max-height: 380px; 
        }

        .print-img {
            width: 100%;
            height: auto;
            max-height: 380px;
            object-fit: contain;
            display: block;
        }

        .client-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            opacity: 0;
            animation: fadeInText var(--velocidade-animacao-fast) ease-out calc(var(--velocidade-animacao-normal) + 0.3s) forwards;
        }

        .client-name {
            font-size: 13px;
            font-weight: 800;
            color: var(--cor-texto-principal);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .client-stars {
            color: var(--cor-destaque);
            font-size: 14px;
            letter-spacing: 2px;
        }

        .template-footer {
            padding: 0 20px 16px 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        .cta-text {
            color: var(--cor-destaque-secundaria);
            font-weight: 500;
            font-size: 11px;
            letter-spacing: 0.3px;
            opacity: 0;
            animation: fadeInLeft var(--velocidade-animacao-fast) ease-out calc(var(--velocidade-animacao-normal) + 0.4s) forwards;
        }

        .footer-accent {
            width: 20px;
            height: 1px;
            background: var(--cor-destaque);
            opacity: 0.3;
        }

        @keyframes fadeInFast  { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        @keyframes fadeInTop   { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInText  { from { opacity: 0; transform: translateX(8px); }  to { opacity: 1; transform: translateX(0); } }
        @keyframes fadeInLeft  { from { opacity: 0; transform: translateX(-16px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes bob         { from { transform: translateY(0px); } to { transform: translateY(4px); } }
        @keyframes pulseFast   { from { opacity: 0.12; } to { opacity: 0.4; } }
    </style>
</head>
<body>

    <div class="template-motion-container" data-ratio="CHAVE_PROPORCAO" id="depoimento-app">

        <div class="side-line"></div>

        <header class="template-header">
            <img src="CHAVE_LOGO" alt="Logo" class="cliente-logo">
        </header>

        <main class="template-main">
            <div class="testimonial-card">
                <div class="quote-icon">"</div>
                
                <p class="testimonial-text">"CHAVE_RESULTADO"</p>
                
                <div class="print-wrapper">
                    <img src="CHAVE_PRINT_MENSAGEM" alt="Print" class="print-img">
                </div>
                
                <div class="client-info">
                    <span class="client-name">CHAVE_NOME_CLIENTE</span>
                    <div class="client-stars">★★★★★</div>
                </div>
            </div>
        </main>

        <footer class="template-footer">
            <span class="cta-text">CHAVE_CTA</span>
            <div class="footer-accent"></div>
        </footer>

    </div>

</body>
</html>
