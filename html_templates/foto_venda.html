<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Venda Direta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --cor-fundo: CHAVE_COR_FUNDO;
            --cor-texto-principal: CHAVE_COR_TEXTO;
            --cor-destaque: CHAVE_COR_DESTAQUE;
            --cor-destaque-secundaria: CHAVE_COR_SECUNDARIA;
            --fonte-principal: 'Montserrat', sans-serif;
            --velocidade-animacao-fast: 0.25s;
            --velocidade-animacao-normal: 0.5s;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--cor-fundo);
            color: var(--cor-texto-principal);
            font-family: var(--fonte-principal);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* ==============================
           PROPORÇÕES — controladas por data-ratio
           ============================== */
        .template-motion-container[data-ratio="4:5"]  { width: 400px; height: 500px; }
        .template-motion-container[data-ratio="1:1"]  { width: 500px; height: 500px; }
        .template-motion-container[data-ratio="9:16"] { width: 405px; height: 720px; }

        .template-motion-container {
            background-color: var(--cor-fundo);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Linha lateral esquerda */
        .side-line {
            position: absolute;
            left: 0; top: 0;
            width: 3px; height: 100%;
            background: linear-gradient(to bottom, transparent 0%, var(--cor-destaque) 30%, var(--cor-destaque) 70%, transparent 100%);
            opacity: 0.35;
            z-index: 1;
            animation: fadeInTop 0.8s ease-out forwards;
        }

        /* ==============================
           HEADER — LOGO
           ============================== */
        .template-header {
            width: 100%;
            height: 75px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2px 20px 4px;
            position: relative;
            z-index: 10;
            animation: fadeInTop var(--velocidade-animacao-fast) ease-out forwards;
        }

        .cliente-logo {
            max-width: 200px;
            max-height: 65px;
            object-fit: contain;
        }

        /* ==============================
           IMAGEM DO PRODUTO — ÁREA REDUZIDA
           ============================== */
        .template-main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            padding: 0 20px;
            position: relative;
        }

        .motion-scene-container {
            width: 100%;
            height: 200px;
            position: relative;
            border-radius: 14px;
            overflow: hidden;
            background-color: rgba(0,0,0,0.04);
            margin-bottom: 12px;
            animation: fadeInFast var(--velocidade-animacao-normal) ease-out forwards,
                       bob 3s ease-in-out infinite alternate 1.2s;
            box-shadow: 0 4px 24px rgba(0,0,0,0.07);
        }

        /* 9:16 — imagem maior */
        .template-motion-container[data-ratio="9:16"] .motion-scene-container { height: 310px; }
        .template-motion-container[data-ratio="1:1"]  .motion-scene-container { height: 220px; }

        .main-product-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 14px;
            display: block;
        }

        .motion-scene-container::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 14px;
            background: linear-gradient(160deg, rgba(255,255,255,0.10) 0%, transparent 50%, rgba(0,0,0,0.06) 100%);
            pointer-events: none;
            z-index: 2;
        }

        /* Badge de urgência — canto superior esquerdo da imagem */
        .badge-urgencia {
            position: absolute;
            top: 12px;
            left: 12px;
            background-color: var(--cor-destaque);
            color: var(--cor-fundo);
            font-size: 9px;
            font-weight: 900;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 20px;
            z-index: 5;
            animation: pulseFast 1.4s ease-in-out infinite alternate;
        }

        .layered-graphic-element {
            position: absolute;
            pointer-events: none;
            border: 1.5px solid var(--cor-destaque);
            border-radius: 8px;
            opacity: 0.18;
            z-index: 3;
            animation: rotateLoop 7s linear infinite, pulseFast 1.6s ease-in-out infinite alternate;
        }
        .element-top-right   { top: 12px; right: 12px; width: 42px; height: 42px; animation-delay: 0s; }
        .element-bottom-left { bottom: 12px; left: 12px; width: 28px; height: 28px; border-radius: 50%; animation-delay: 0.5s; }

        /* ==============================
           TEXTO — NOME + DESCRIÇÃO
           ============================== */
        .text-details {
            width: 100%;
            text-align: left;
            position: relative;
            z-index: 10;
            padding-left: 2px;
            margin-bottom: 10px;
        }

        .product-name {
            font-size: 16px;
            font-weight: 900;
            color: var(--cor-texto-principal);
            margin-bottom: 4px;
            letter-spacing: -0.3px;
            line-height: 1.2;
            opacity: 0;
            animation: fadeInText var(--velocidade-animacao-fast) ease-out calc(var(--velocidade-animacao-normal) + 0.1s) forwards;
        }

        .product-desc {
            font-size: 11px;
            font-weight: 400;
            color: var(--cor-texto-principal);
            line-height: 1.5;
            opacity: 0;
            animation: fadeInText var(--velocidade-animacao-fast) ease-out calc(var(--velocidade-animacao-normal) + 0.2s) forwards;
        }

        /* ==============================
           BLOCO DE PREÇO — DESTAQUE MÁXIMO
           ============================== */
        .price-block {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            margin-bottom: 10px;
            opacity: 0;
            animation: fadeInText var(--velocidade-animacao-fast) ease-out calc(var(--velocidade-animacao-normal) + 0.25s) forwards;
        }

        .price-original {
            font-size: 12px;
            font-weight: 400;
            color: var(--cor-destaque-secundaria);
            text-decoration: line-through;
            opacity: 0.7;
            padding-bottom: 2px;
        }

        .price-atual {
            font-size: 30px;
            font-weight: 900;
            color: var(--cor-destaque);
            letter-spacing: -1px;
            line-height: 1;
        }

        .price-condicao {
            font-size: 10px;
            font-weight: 500;
            color: var(--cor-destaque-secundaria);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding-bottom: 4px;
        }

        /* ==============================
           DIVISOR
           ============================== */
        .divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(to right, var(--cor-destaque) 0%, transparent 100%);
            opacity: 0.18;
            margin: 0 0 10px 0;
            animation: fadeInText var(--velocidade-animacao-fast) ease-out calc(var(--velocidade-animacao-normal) + 0.3s) forwards;
        }

        /* ==============================
           FOOTER — CTA
           ============================== */
        .template-footer {
            padding: 0 20px 16px 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        .cta-text {
            color: var(--cor-destaque-secundaria);
            font-weight: 500;
            font-size: 11px;
            letter-spacing: 0.3px;
            opacity: 0;
            animation: fadeInLeft var(--velocidade-animacao-fast) ease-out calc(var(--velocidade-animacao-normal) + 0.4s) forwards;
        }

        .footer-accent {
            width: 20px;
            height: 1px;
            background: var(--cor-destaque);
            opacity: 0.3;
        }

        /* ==============================
           ANIMAÇÕES
           ============================== */
        @keyframes fadeInFast  { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        @keyframes fadeInTop   { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInText  { from { opacity: 0; transform: translateX(8px); }  to { opacity: 1; transform: translateX(0); } }
        @keyframes fadeInLeft  { from { opacity: 0; transform: translateX(-16px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes bob         { from { transform: translateY(0px); } to { transform: translateY(4px); } }
        @keyframes pulseFast   { from { opacity: 0.12; } to { opacity: 0.3; } }
        @keyframes rotateLoop  { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="template-motion-container" data-ratio="CHAVE_PROPORCAO" id="venda-direta-app">

        <div class="side-line"></div>

        <header class="template-header">
            <img src="CHAVE_LOGO" alt="Logo" class="cliente-logo">
        </header>

        <main class="template-main">

            <div class="motion-scene-container">
                <img src="CHAVE_IMAGEM" class="main-product-img" alt="Produto">
                <div class="badge-urgencia">CHAVE_BADGE</div>
                <div class="layered-graphic-element element-top-right"></div>
                <div class="layered-graphic-element element-bottom-left"></div>
            </div>

            <div class="text-details">
                <h1 class="product-name">CHAVE_TITULO</h1>
                <p class="product-desc">CHAVE_DESCRICAO</p>
            </div>

            <div class="price-block">
                <span class="price-original">CHAVE_PRECO_DE</span>
                <span class="price-atual">CHAVE_PRECO_POR</span>
                <span class="price-condicao">CHAVE_CONDICAO</span>
            </div>

            <div class="divider"></div>

        </main>

        <footer class="template-footer">
            <span class="cta-text">CHAVE_CTA</span>
            <div class="footer-accent"></div>
        </footer>

    </div>

</body>
</html>
