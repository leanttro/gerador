<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Template Dicas - Leanttro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --cor-fundo: CHAVE_COR_FUNDO;
            --cor-texto-principal: CHAVE_COR_TEXTO;
            --cor-destaque: CHAVE_COR_DESTAQUE;
            --cor-destaque-secundaria: CHAVE_COR_SECUNDARIA;
            --fonte-principal: 'Montserrat', sans-serif;
            --velocidade-animacao-fast: 0.25s;
            --velocidade-animacao-normal: 0.5s;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-font-smoothing: antialiased;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--cor-fundo);
        }

        body {
            color: var(--cor-texto-principal);
            font-family: var(--fonte-principal);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .template-motion-container {
            width: 100%;
            height: 100%;
            background-color: var(--cor-fundo);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .side-line {
            position: absolute;
            left: 0; 
            top: 0;
            width: 4px; 
            height: 100%;
            background: linear-gradient(to bottom, transparent 0%, var(--cor-destaque) 30%, var(--cor-destaque) 70%, transparent 100%);
            opacity: 0.6;
            z-index: 1;
            animation: fadeInTop 0.8s ease-out forwards;
        }

        .template-header {
            width: 100%;
            height: 24%; /* Aumentado para descer o logo o dobro da vez anterior */
            display: flex;
            justify-content: center;
            align-items: flex-end; 
            padding: 0 20px 10px;
            position: relative;
            z-index: 10;
            animation: fadeInTop var(--velocidade-animacao-fast) ease-out forwards;
        }

        .cliente-logo {
            max-width: 162px;
            max-height: 63px;
            object-fit: contain;
        }

        .template-main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 12%; 
            position: relative;
            z-index: 10;
        }

        .title-block {
            margin-bottom: 22px;
            opacity: 0;
            text-align: left;
            animation: fadeInText var(--velocidade-animacao-fast) ease-out calc(var(--velocidade-animacao-normal) + 0.1s) forwards;
        }

        .tips-title {
            font-size: 6.75vw;
            font-weight: 900;
            line-height: 1.1;
            color: var(--cor-texto-principal);
            text-transform: uppercase;
            letter-spacing: -0.5px;
        }

        .tips-list {
            display: flex;
            flex-direction: column;
            gap: 13.5px;
        }

        .tip-item {
            display: flex;
            align-items: flex-start;
            gap: 12.6px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 18px;
            border-radius: 12px;
            border-left: 4.5px solid var(--cor-destaque);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            opacity: 0;
        }

        .tip-1 { animation: fadeInRight var(--velocidade-animacao-fast) ease-out calc(var(--velocidade-animacao-normal) + 0.2s) forwards; }
        .tip-2 { animation: fadeInRight var(--velocidade-animacao-fast) ease-out calc(var(--velocidade-animacao-normal) + 0.3s) forwards; }
        .tip-3 { animation: fadeInRight var(--velocidade-animacao-fast) ease-out calc(var(--velocidade-animacao-normal) + 0.4s) forwards; }

        .tip-number {
            font-size: 7.2vw;
            font-weight: 900;
            color: var(--cor-destaque);
            line-height: 1;
        }

        .tip-text {
            font-size: 3.6vw;
            font-weight: 600;
            color: var(--cor-texto-principal);
            line-height: 1.4;
            padding-top: 3.6px;
        }

        .template-footer {
            height: 14%;
            padding: 0 10% 45px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        .cta-text {
            color: var(--cor-destaque-secundaria);
            font-weight: 700;
            font-size: 2.9vw;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0;
            animation: fadeInLeft var(--velocidade-animacao-fast) ease-out calc(var(--velocidade-animacao-normal) + 0.5s) forwards;
        }

        .footer-accent {
            width: 31px;
            height: 1.8px;
            background: var(--cor-destaque);
            opacity: 0.5;
        }

        @media (min-width: 600px) {
            .tips-title { font-size: 32px; }
            .tip-number { font-size: 38px; }
            .tip-text { font-size: 16px; }
            .cta-text { font-size: 12.5px; }
            .template-main { padding: 0 50px; }
            .template-footer { padding: 0 40px 45px; }
        }

        @keyframes fadeInTop   { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInText  { from { opacity: 0; transform: translateX(10px); }  to { opacity: 1; transform: translateX(0); } }
        @keyframes fadeInRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes fadeInLeft  { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

    <div class="template-motion-container" id="dicas-app">

        <div class="side-line"></div>

        <header class="template-header">
            <img src="CHAVE_LOGO" alt="Logo" class="cliente-logo">
        </header>

        <main class="template-main">
            
            <div class="title-block">
                <h1 class="tips-title">CHAVE_TITULO</h1>
            </div>

            <div class="tips-list">
                <div class="tip-item tip-1">
                    <span class="tip-number">1</span>
                    <p class="tip-text">CHAVE_DICA_1</p>
                </div>
                
                <div class="tip-item tip-2">
                    <span class="tip-number">2</span>
                    <p class="tip-text">CHAVE_DICA_2</p>
                </div>
                
                <div class="tip-item tip-3">
                    <span class="tip-number">3</span>
                    <p class="tip-text">CHAVE_DICA_3</p>
                </div>
            </div>

        </main>

        <footer class="template-footer">
            <span class="cta-text">CHAVE_CTA</span>
            <div class="footer-accent"></div>
        </footer>

    </div>

</body>
</html>
