<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Comercial</title>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,600;1,700;1,800&display=swap" rel="stylesheet">
    <style>
        :root {
            --cor-fundo: CHAVE_COR_FUNDO;
            --cor-texto: CHAVE_COR_TEXTO;
            --cor-destaque: CHAVE_COR_DESTAQUE;
            --cor-secundaria: CHAVE_COR_SECUNDARIA;
            --cor-overlay: CHAVE_COR_OVERLAY;
            --cor-cta-fundo: CHAVE_COR_CTA_FUNDO;
            --cor-cta-texto: CHAVE_COR_CTA_TEXTO;
            --cor-rodape-fundo: CHAVE_COR_RODAPE_FUNDO;
            --cor-rodape-texto: CHAVE_COR_RODAPE_TEXTO;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Figtree', sans-serif;
        }

        /* ─── CONTAINER ─── */
        .card {
            width: 400px;
            height: 500px;
            background: var(--cor-fundo);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Modo 9:16 */
        .card.modo-916 {
            width: 400px;
            height: 711px;
        }

        /* ─── BLOCO FOTO (topo, ~60% do card) ─── */
        .foto-bloco {
            position: relative;
            width: 100%;
            flex: 0 0 60%;
            overflow: hidden;
        }

        .card.modo-916 .foto-bloco {
            flex: 0 0 63%;
        }

        .foto-principal {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            display: block;
        }

        /* ─── ORNAMENTO CIRCULAR (canto sup direito) ─── */
        .ornamento {
            position: absolute;
            top: -28px;
            right: -28px;
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: var(--cor-destaque);
            z-index: 3;
            display: flex;
            align-items: flex-end;
            justify-content: flex-start;
            padding: 18px 0 0 18px;
        }

        .ornamento svg {
            width: 42px;
            height: 42px;
            opacity: 0.45;
        }

        /* ─── BLOCO TÍTULO (sobreposição canto ESQ sobre a foto) ─── */
        .bloco-titulo {
            position: absolute;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
            width: 60%;
            background: var(--cor-overlay);
            padding: 14px 16px;
            z-index: 4;
        }

        .titulo {
            font-size: 15px;
            font-weight: 400;
            color: var(--cor-texto);
            line-height: 1.35;
            margin-bottom: 7px;
        }

        .titulo em {
            font-style: italic;
            font-weight: 800;
        }

        .subtitulo {
            font-size: 9.5px;
            font-weight: 400;
            color: var(--cor-secundaria);
            line-height: 1.5;
        }

        /* ─── BLOCO CONTEÚDO (parte baixa do card) ─── */
        .conteudo-baixo {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--cor-fundo);
            padding: 14px 16px 0 16px;
        }

        /* ─── BULLETS ─── */
        .bullets {
            list-style: none;
            flex: 1;
        }

        .bullets li {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            font-size: 10.5px;
            font-weight: 500;
            color: var(--cor-texto);
            line-height: 1.4;
            margin-bottom: 8px;
        }

        .bullets li:empty { display: none; }

        .check-icon {
            flex-shrink: 0;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--cor-destaque);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 1px;
        }

        .check-icon svg {
            width: 8px;
            height: 8px;
            stroke: #fff;
            stroke-width: 2.5;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* ─── FAIXA CTA ─── */
        .faixa-cta {
            width: calc(100% + 32px);
            margin-left: -16px;
            background: var(--cor-cta-fundo);
            padding: 9px 16px;
            text-align: center;
            margin-top: 10px;
        }

        .faixa-cta p {
            font-size: 11px;
            font-weight: 700;
            color: var(--cor-cta-texto);
            line-height: 1.4;
        }

        .faixa-cta:empty,
        .faixa-cta[data-vazio] { display: none; }

        /* ─── RODAPÉ ─── */
        .rodape {
            background: var(--cor-rodape-fundo);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .rodape-logo {
            max-height: 30px;
            max-width: 120px;
            object-fit: contain;
        }

        .rodape-social {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .rodape-social svg {
            width: 13px;
            height: 13px;
            fill: var(--cor-rodape-texto);
            flex-shrink: 0;
        }

        .rodape-social span {
            font-size: 10px;
            font-weight: 600;
            color: var(--cor-rodape-texto);
            letter-spacing: 0.2px;
        }

    </style>
</head>
<body>

<div class="card" id="card">

    <!-- BLOCO FOTO -->
    <div class="foto-bloco">

        <img
            src="CHAVE_IMAGEM"
            class="foto-principal"
            alt="Foto"
            onerror="this.style.visibility='hidden'"
        >

        <!-- ORNAMENTO CIRCULAR CANTO SUP DIREITO -->
        <div class="ornamento">
            <svg viewBox="0 0 60 60" fill="rgba(255,255,255,0.6)" xmlns="http://www.w3.org/2000/svg">
                <ellipse cx="30" cy="30" rx="12" ry="26" transform="rotate(-30 30 30)"/>
                <ellipse cx="30" cy="30" rx="12" ry="26" transform="rotate(30 30 30)"/>
                <ellipse cx="30" cy="30" rx="12" ry="26" transform="rotate(90 30 30)" opacity="0.4"/>
            </svg>
        </div>

        <!-- BLOCO TÍTULO SOBRE A FOTO -->
        <div class="bloco-titulo" id="bloco-titulo">
            <h1 class="titulo" id="titulo-el">CHAVE_TITULO</h1>
            <p class="subtitulo" id="subtitulo-el">CHAVE_SUBTITULO</p>
        </div>

    </div>

    <!-- CONTEÚDO INFERIOR -->
    <div class="conteudo-baixo">

        <ul class="bullets" id="bullets">
            <li id="item1">
                <span class="check-icon"><svg viewBox="0 0 10 10"><polyline points="2,5 4.5,8 8,2"/></svg></span>
                <span id="item1-txt">CHAVE_ITEM1</span>
            </li>
            <li id="item2">
                <span class="check-icon"><svg viewBox="0 0 10 10"><polyline points="2,5 4.5,8 8,2"/></svg></span>
                <span id="item2-txt">CHAVE_ITEM2</span>
            </li>
            <li id="item3">
                <span class="check-icon"><svg viewBox="0 0 10 10"><polyline points="2,5 4.5,8 8,2"/></svg></span>
                <span id="item3-txt">CHAVE_ITEM3</span>
            </li>
        </ul>

        <!-- FAIXA CTA -->
        <div class="faixa-cta" id="faixa-cta">
            <p id="cta-txt">CHAVE_CTA</p>
        </div>

    </div>

    <!-- RODAPÉ -->
    <footer class="rodape">
        <img
            src="CHAVE_LOGO"
            class="rodape-logo"
            alt="Logo"
            onerror="this.style.display='none'"
        >
        <div class="rodape-social" id="rodape-social">
            <!-- Instagram icon -->
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
            </svg>
            <span id="social-txt">CHAVE_REDE_SOCIAL</span>
        </div>
    </footer>

</div>

<script>
    /*
     * CHAVES DISPONÍVEIS:
     *
     * -- CORES (substituídas no :root) --
     * CHAVE_COR_FUNDO          fundo do card                ex: #f5f5f5
     * CHAVE_COR_TEXTO          texto principal              ex: #111111
     * CHAVE_COR_DESTAQUE       cor dos bullets/ornamento    ex: #c9a227
     * CHAVE_COR_SECUNDARIA     subtítulo / textos suaves    ex: rgba(255,255,255,0.75)
     * CHAVE_COR_OVERLAY        fundo do bloco título        ex: rgba(20,40,60,0.85)
     * CHAVE_COR_CTA_FUNDO      fundo da faixa CTA           ex: #c9a227
     * CHAVE_COR_CTA_TEXTO      texto da faixa CTA           ex: #ffffff
     * CHAVE_COR_RODAPE_FUNDO   fundo do rodapé              ex: #f0f0f0
     * CHAVE_COR_RODAPE_TEXTO   texto/ícone do rodapé        ex: #333333
     *
     * -- CONTEÚDO --
     * CHAVE_IMAGEM             URL da foto principal (9:16 ideal)
     * CHAVE_LOGO               URL do logo (PNG transparente)
     * CHAVE_TITULO             Título — aceita <em> para itálico/negrito
     * CHAVE_SUBTITULO          Subtítulo abaixo do título
     * CHAVE_ITEM1              Bullet 1
     * CHAVE_ITEM2              Bullet 2
     * CHAVE_ITEM3              Bullet 3
     * CHAVE_CTA                Texto da faixa dourada
     * CHAVE_REDE_SOCIAL        Handle ex: @habitlclinica
     *
     * -- FORMATO --
     * Adicione ?formato=916 na URL ou window.FORMATO_916 = true para 9:16
     */
    (function() {
        var C = /^CHAVE_/;

        var ids = {
            'titulo-el':   null,
            'subtitulo-el': null,
            'item1-txt':   'item1',
            'item2-txt':   'item2',
            'item3-txt':   'item3',
            'cta-txt':     'faixa-cta',
            'social-txt':  'rodape-social'
        };

        Object.keys(ids).forEach(function(id) {
            var el = document.getElementById(id);
            if (!el) return;
            if (C.test(el.textContent.trim())) {
                var parentId = ids[id];
                var hide = parentId ? document.getElementById(parentId) : el;
                if (hide) hide.style.display = 'none';
            }
        });

        var params = new URLSearchParams(window.location.search);
        if (params.get('formato') === '916' || window.FORMATO_916) {
            document.getElementById('card').classList.add('modo-916');
        }
    })();
</script>

</body>
</html>
