<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Bastidores | Humaniza a Marca</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --cor-fundo: CHAVE_COR_FUNDO;
            --cor-texto-principal: CHAVE_COR_TEXTO;
            --cor-destaque: CHAVE_COR_DESTAQUE;
            --cor-destaque-secundaria: CHAVE_COR_SECUNDARIA;
            --fonte-principal: 'Montserrat', sans-serif;
            --velocidade-animacao-fast: 0.25s;
            --velocidade-animacao-normal: 0.5s;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--cor-fundo);
            color: var(--cor-texto-principal);
            font-family: var(--fonte-principal);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* ==============================
           PROPORÇÕES — controladas por data-ratio
           ============================== */
        .template-motion-container[data-ratio="4:5"]  { width: 400px; height: 500px; }
        .template-motion-container[data-ratio="1:1"]  { width: 500px; height: 500px; }
        .template-motion-container[data-ratio="9:16"] { width: 405px; height: 720px; }

        .template-motion-container {
            background-color: var(--cor-fundo);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* NOVO WRAPPER PARA CENTRALIZAR E REDUZIR 10% SEM BUGAR O HTML2CANVAS */
        .content-wrapper {
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 90%;
            height: 90%;
            margin: auto;
            z-index: 10;
            position: relative;
        }

        /* ==============================
           FUNDO MARQUEE
           ============================== */
        .bg-marquee-wrapper {
            position: absolute;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
        }

        .bg-marquee-row { display: flex; white-space: nowrap; width: max-content; }
        .bg-marquee-row:nth-child(odd)  { animation: marqueeLeft 18s linear infinite; }
        .bg-marquee-row:nth-child(even) { animation: marqueeRight 22s linear infinite; }

        .bg-marquee-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 28px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: var(--cor-destaque);
            opacity: 0.066;
            padding-right: 60px;
            user-select: none;
        }

        @keyframes marqueeLeft  { from { transform: translateX(0); }    to { transform: translateX(-50%); } }
        @keyframes marqueeRight { from { transform: translateX(-50%); } to { transform: translateX(0); } }

        /* Linha lateral esquerda */
        .side-line {
            position: absolute;
            left: 0; top: 0;
            width: 3px; height: 100%;
            background: linear-gradient(to bottom, transparent 0%, var(--cor-destaque) 30%, var(--cor-destaque) 70%, transparent 100%);
            opacity: 0.35;
            z-index: 1;
            animation: fadeInTop 0.8s ease-out forwards;
        }

        /* ==============================
           HEADER — LOGO
           ============================== */
        .template-header {
            width: 100%;
            height: 75px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2px 20px 4px;
            margin-bottom: 20px;
            position: relative;
            z-index: 10;
            animation: fadeInTop var(--velocidade-animacao-fast) ease-out forwards;
        }

        .cliente-logo {
            max-width: 200px;
            max-height: 65px;
            object-fit: contain;
        }

        /* ==============================
           ÁREA PRINCIPAL (VÍDEO/IMAGEM + ETAPAS)
           ============================== */
        .template-main {
            flex-grow: 0;
            display: flex;
            flex-direction: column;
            padding: 0 20px;
            position: relative;
        }

        /* Container do vídeo/imagem de bastidores */
        .motion-scene-container {
            width: 100%;
            height: 180px;
            position: relative;
            border-radius: 14px;
            overflow: hidden;
            background-color: rgba(0,0,0,0.04);
            margin-bottom: 12px;
            animation: fadeInFast var(--velocidade-animacao-normal) ease-out forwards,
                       bob 3s ease-in-out infinite alternate 1.2s;
            box-shadow: 0 4px 24px rgba(0,0,0,0.07);
        }

        .template-motion-container[data-ratio="9:16"] .motion-scene-container { height: 240px; }
        .template-motion-container[data-ratio="1:1"]  .motion-scene-container { height: 200px; }

        .media-bastidores {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 14px;
            display: block;
        }

        .motion-scene-container::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 14px;
            background: linear-gradient(160deg, rgba(255,255,255,0.10) 0%, transparent 50%, rgba(0,0,0,0.06) 100%);
            pointer-events: none;
            z-index: 2;
        }

        /* Badge BASTIDORES decorativo */
        .badge-bastidores {
            position: absolute;
            top: 12px;
            left: 12px;
            background-color: var(--cor-destaque);
            color: var(--cor-fundo);
            font-size: 9px;
            font-weight: 900;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 20px;
            z-index: 5;
            animation: pulseFast 1.4s ease-in-out infinite alternate;
        }

        /* Elementos gráficos decorativos */
        .layered-graphic-element {
            position: absolute;
            pointer-events: none;
            border: 1.5px solid var(--cor-destaque);
            border-radius: 8px;
            opacity: 0.18;
            z-index: 3;
            animation: rotateLoop 7s linear infinite, pulseFast 1.6s ease-in-out infinite alternate;
        }
        .element-top-right   { top: 12px; right: 12px; width: 42px; height: 42px; animation-delay: 0s; }
        .element-bottom-left { bottom: 12px; left: 12px; width: 28px; height: 28px; border-radius: 50%; animation-delay: 0.5s; }

        /* ==============================
           TEXTO PRINCIPAL + SUBTÍTULO
           ============================== */
        .text-details {
            width: 100%;
            text-align: left;
            position: relative;
            z-index: 10;
            padding-left: 2px;
            margin-bottom: 8px;
        }

        .bastidores-titulo {
            font-size: 16px;
            font-weight: 900;
            color: var(--cor-texto-principal);
            margin-bottom: 4px;
            letter-spacing: -0.3px;
            line-height: 1.2;
            opacity: 0;
            animation: fadeInText var(--velocidade-animacao-fast) ease-out calc(var(--velocidade-animacao-normal) + 0.1s) forwards;
        }

        .bastidores-subtitulo {
            font-size: 11px;
            font-weight: 400;
            color: var(--cor-texto-principal);
            line-height: 1.5;
            opacity: 0;
            animation: fadeInText var(--velocidade-animacao-fast) ease-out calc(var(--velocidade-animacao-normal) + 0.2s) forwards;
        }

        /* ==============================
           ETAPAS DO PROCESSO (3 passos)
           ============================== */
        .process-steps {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin: 12px 0 10px 0;
            opacity: 0;
            animation: fadeInText var(--velocidade-animacao-fast) ease-out calc(var(--velocidade-animacao-normal) + 0.25s) forwards;
        }

        .step-item {
            flex: 1;
            text-align: center;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 8px 4px;
            backdrop-filter: blur(2px);
            border: 0.5px solid var(--cor-destaque);
            opacity: 0.8;
            transition: all 0.2s;
        }

        .step-number {
            font-size: 18px;
            font-weight: 900;
            color: var(--cor-destaque);
            margin-bottom: 4px;
        }

        .step-text {
            font-size: 9px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--cor-texto-principal);
        }

        /* ==============================
           DEPOIMENTO CURTO / FRASE HUMANIZADA
           ============================== */
        .human-quote {
            background: rgba(255,255,255,0.04);
            border-left: 3px solid var(--cor-destaque);
            padding: 8px 12px;
            border-radius: 12px;
            margin: 6px 0 8px 0;
            font-size: 11px;
            font-style: italic;
            color: var(--cor-texto-principal);
            opacity: 0;
            animation: fadeInText var(--velocidade-animacao-fast) ease-out calc(var(--velocidade-animacao-normal) + 0.3s) forwards;
        }

        .quote-author {
            display: block;
            font-size: 9px;
            font-weight: 600;
            margin-top: 6px;
            color: var(--cor-destaque-secundaria);
            text-transform: uppercase;
        }

        /* ==============================
           DIVISOR
           ============================== */
        .divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(to right, var(--cor-destaque) 0%, transparent 100%);
            opacity: 0.18;
            margin: 0 0 8px 0;
            animation: fadeInText var(--velocidade-animacao-fast) ease-out calc(var(--velocidade-animacao-normal) + 0.35s) forwards;
        }

        /* ==============================
           FOOTER — CTA
           ============================== */
        .template-footer {
            padding: 0 20px 16px 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        .cta-text {
            color: var(--cor-destaque-secundaria);
            font-weight: 500;
            font-size: 11px;
            letter-spacing: 0.3px;
            opacity: 0;
            animation: fadeInLeft var(--velocidade-animacao-fast) ease-out calc(var(--velocidade-animacao-normal) + 0.4s) forwards;
        }

        .footer-accent {
            width: 20px;
            height: 1px;
            background: var(--cor-destaque);
            opacity: 0.3;
        }

        /* ==============================
           ANIMAÇÕES
           ============================== */
        @keyframes fadeInFast  { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        @keyframes fadeInTop   { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInText  { from { opacity: 0; transform: translateX(8px); }  to { opacity: 1; transform: translateX(0); } }
        @keyframes fadeInLeft  { from { opacity: 0; transform: translateX(-16px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes bob         { from { transform: translateY(0px); } to { transform: translateY(4px); } }
        @keyframes pulseFast   { from { opacity: 0.12; } to { opacity: 0.3; } }
        @keyframes rotateLoop  { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="template-motion-container" data-ratio="CHAVE_PROPORCAO" id="bastidores-app">

        <div class="side-line"></div>

        <div class="content-wrapper">
            <header class="template-header">
                <img src="CHAVE_LOGO" alt="Logo" class="cliente-logo">
            </header>

            <main class="template-main">

                <div class="motion-scene-container">
                    <img src="CHAVE_IMAGEM" class="media-bastidores" alt="Bastidores">
                    <div class="badge-bastidores">BASTIDORES</div>
                    <div class="layered-graphic-element element-top-right"></div>
                    <div class="layered-graphic-element element-bottom-left"></div>
                </div>

                <div class="text-details">
                    <h1 class="bastidores-titulo">CHAVE_TITULO</h1>
                    <p class="bastidores-subtitulo">CHAVE_SUBTITULO</p>
                </div>

                <div class="process-steps">
                    <div class="step-item">
                        <div class="step-number">01</div>
                        <div class="step-text">CHAVE_ETAPA_1</div>
                    </div>
                    <div class="step-item">
                        <div class="step-number">02</div>
                        <div class="step-text">CHAVE_ETAPA_2</div>
                    </div>
                    <div class="step-item">
                        <div class="step-number">03</div>
                        <div class="step-text">CHAVE_ETAPA_3</div>
                    </div>
                </div>

                <div class="human-quote">
                    CHAVE_FRASE_HUMANA
                    <span class="quote-author"> CHAVE_AUTOR_FRASE</span>
                </div>

                <div class="divider"></div>

            </main>

            <footer class="template-footer">
                <span class="cta-text">CHAVE_CTA</span>
                <div class="footer-accent"></div>
            </footer>
        </div>

    </div>

</body>
</html>
