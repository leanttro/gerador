<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Demo Feed 4:5</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        :root {
            --cor-fundo: CHAVE_COR_FUNDO;
            --cor-destaque: CHAVE_COR_DESTAQUE;
            --cor-texto: CHAVE_COR_TEXTO;
            --cor-secundaria: CHAVE_COR_SECUNDARIA;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--cor-fundo);
            font-family: 'Montserrat', sans-serif;
            width: 100vw; height: 100vh;
            overflow: hidden;
        }
        .container {
            width: 100vw; height: 100vh;
            position: relative; overflow: hidden;
            background-color: var(--cor-fundo);
        }
        .foto {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            object-fit: cover; z-index: 0;
        }
        .overlay {
            position: absolute; inset: 0; z-index: 1;
            background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,0.05) 40%, rgba(0,0,0,0.6) 70%, rgba(0,0,0,0.92) 100%);
        }
        .top-line {
            position: absolute; top: 0; left: 0; right: 0;
            height: clamp(3px, 0.5vh, 5px);
            background-color: var(--cor-destaque); z-index: 5;
        }
        .circle-tr {
            position: absolute;
            top: clamp(-45px,-9vw,-30px); right: clamp(-45px,-9vw,-30px);
            width: clamp(130px,27vw,200px); height: clamp(130px,27vw,200px);
            border-radius: 50%; border: 1.5px solid var(--cor-destaque);
            opacity: 0.18; z-index: 2;
        }
        .circle-bl {
            position: absolute;
            bottom: clamp(60px,14vh,100px); left: clamp(-50px,-10vw,-35px);
            width: clamp(110px,22vw,160px); height: clamp(110px,22vw,160px);
            border-radius: 50%; border: 1.5px solid var(--cor-destaque);
            opacity: 0.1; z-index: 2;
        }
        .linha-v {
            position: absolute; right: clamp(18px,4.5vw,36px);
            top: 25%; bottom: clamp(55px,13vh,90px);
            width: 1px; background-color: var(--cor-destaque);
            opacity: 0.25; z-index: 3;
        }
        .header {
            position: absolute; top: 0; left: 0; right: 0;
            height: clamp(60px,13vh,95px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 clamp(18px,4.5vw,36px); z-index: 10;
        }
        .logo {
            max-width: clamp(80px,26vw,160px); max-height: clamp(30px,7vh,52px);
            object-fit: contain;
        }
        .badge-formato {
            font-size: clamp(8px,1.8vw,11px); font-weight: 700;
            letter-spacing: 2px; text-transform: uppercase;
            color: var(--cor-fundo); background-color: var(--cor-destaque);
            padding: clamp(5px,1.1vh,8px) clamp(12px,3vw,20px);
        }
        .bottom-block {
            position: absolute; bottom: 0; left: 0; right: 0;
            z-index: 10;
            padding: 0 clamp(20px,5.5vw,44px) clamp(22px,5.5vh,42px);
        }
        .divisor {
            width: clamp(28px,7vw,44px); height: 2.5px;
            background-color: var(--cor-destaque);
            margin-bottom: clamp(10px,2.5vh,18px);
        }
        .titulo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(38px,14vw,86px);
            color: var(--cor-texto); line-height: 0.92;
            letter-spacing: 1px; margin-bottom: clamp(10px,2.5vh,18px);
        }
        .cta {
            font-size: clamp(8px,1.8vw,11px); font-weight: 700;
            letter-spacing: 2.5px; text-transform: uppercase;
            color: var(--cor-destaque);
        }
        .footer {
            position: absolute; bottom: clamp(8px,1.8vh,14px);
            left: clamp(20px,5.5vw,44px); right: clamp(20px,5.5vw,44px);
            display: flex; justify-content: space-between; align-items: center;
            z-index: 10;
        }
        .usuario {
            font-size: clamp(8px,1.8vw,11px); font-weight: 600;
            letter-spacing: 2px; text-transform: uppercase;
            color: var(--cor-destaque); opacity: 0.6;
        }
        .dots { display: flex; gap: clamp(4px,1vw,7px); }
        .dot {
            width: clamp(6px,1.4vw,9px); height: clamp(6px,1.4vw,9px);
            border-radius: 50%; background-color: var(--cor-destaque);
        }
        .dot:nth-child(1) { opacity: 1; }
        .dot:nth-child(2) { opacity: 0.4; }
        .dot:nth-child(3) { opacity: 0.7; }
    </style>
</head>
<body>
<div class="container">
    <div class="top-line"></div>
    <div class="circle-tr"></div>
    <div class="circle-bl"></div>
    <div class="linha-v"></div>
    <img src="CHAVE_IMAGEM" alt="Foto" class="foto">
    <div class="overlay"></div>
    <header class="header">
        <img src="CHAVE_LOGO" alt="Logo" class="logo">
        <div class="badge-formato">4:5 &nbsp;·&nbsp; Feed</div>
    </header>
    <div class="bottom-block">
        <div class="divisor"></div>
        <h1 class="titulo">CHAVE_TITULO</h1>
        <p class="cta">CHAVE_CTA</p>
    </div>
    <div class="footer">
        <span class="usuario">CHAVE_USUARIO</span>
        <div class="dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>
</div>
</body>
</html>
