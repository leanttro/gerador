<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHAVE_NOME_TEMPLATE</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  /* Cores baseadas no design claro da imagem */
  --bg: #F0F0F0; /* Fundo cinza muito claro */
  --text: #000000; /* Texto preto */
  --brand: #F51B6A; /* Rosa vibrante do botão */
  --btn-text: #FFFFFF;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  width: 100vw;
  height: 100vh;
  /* Fundo claro com os gradientes de cor do design */
  background-color: var(--bg);
  background-image: 
    radial-gradient(circle at 10% 90%, rgba(245, 27, 106, 0.4) 0%, rgba(245, 27, 106, 0) 50%),
    radial-gradient(circle at 90% 10%, rgba(11, 218, 255, 0.4) 0%, rgba(11, 218, 255, 0) 50%),
    radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.8) 0%, rgba(255, 255, 255, 0) 100%);
  font-family: 'Inter', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

.container {
  width: 100%;
  height: 100%;
  /* Layout horizontal (lado a lado) */
  display: flex;
  flex-direction: row;
  justify-content: space-between;
  align-items: center;
  gap: 4vw;
  padding: 4vw;
  max-width: 1600px;
}

/* Coluna de Texto (Esquerda) */
.col-text {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: flex-start;
  text-align: left;
  opacity: 0;
  animation: fadeRight 0.8s ease-out forwards;
}

/* Estilo do Logo */
.logo-wrapper {
  margin-bottom: 2vh;
  width: clamp(80px, 10vw, 150px);
  height: clamp(80px, 10vw, 150px);
  display: flex;
  justify-content: center;
  align-items: center;
  border-radius: 50%;
  border: 2px solid var(--text);
  overflow: hidden;
}

.logo {
  width: 80%;
  height: 80%;
  object-fit: contain;
}

.eyebrow {
  font-size: clamp(0.8rem, 1.2vw, 1.3rem);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 2vh;
  font-weight: 600;
  color: var(--text);
  opacity: 0.8;
}

.title {
  font-family: 'Montserrat', sans-serif;
  font-size: clamp(3rem, 5vw, 6rem);
  font-weight: 900;
  line-height: 1.05;
  margin-bottom: 3vh;
  text-transform: uppercase;
  color: var(--text);
}

.subtitle {
  font-size: clamp(1.1rem, 1.5vw, 1.8rem);
  line-height: 1.4;
  margin-bottom: 4vh;
  font-weight: 400;
  color: rgba(0,0,0,0.8);
  max-width: 95%;
}

.btn {
  align-self: flex-start;
  background-color: var(--brand);
  color: var(--btn-text);
  font-family: 'Montserrat', sans-serif;
  font-weight: 800;
  font-size: clamp(1rem, 1.4vw, 1.6rem);
  padding: 2vh 3vw;
  border-radius: 8px;
  text-transform: uppercase;
  border: none;
  box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  cursor: pointer;
  transition: transform 0.3s ease, background-color 0.3s ease;
  animation: pulseBtn 2.5s infinite;
}

.btn:hover {
  background-color: #D6125C; /* Rosa ligeiramente mais escuro */
  transform: translateY(-2px);
}

/* Coluna de Imagem (Direita) */
.col-img {
  flex: 0 0 clamp(300px, 40%, 600px); /* Tamanho fixo flexível */
  height: clamp(400px, 60vh, 800px);
  border-radius: 20px;
  overflow: hidden;
  position: relative;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  opacity: 0;
  transform: scale(0.95);
  animation: fadeScale 0.8s ease-out 0.4s forwards;
}

.col-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 10s ease;
}

.col-img:hover img {
  transform: scale(1.05);
}

/* Animações */
@keyframes fadeRight {
  0% { opacity: 0; transform: translateX(-40px); }
  100% { opacity: 1; transform: translateX(0); }
}

@keyframes fadeScale {
  0% { opacity: 0; transform: scale(0.95); }
  100% { opacity: 1; transform: scale(1); }
}

@keyframes pulseBtn {
  0% { transform: scale(1); box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
  50% { transform: scale(1.03); box-shadow: 0 12px 30px rgba(0,0,0,0.25); }
  100% { transform: scale(1); box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
}
</style>
</head>
<body>

<div class="container">
  
  <div class="col-text">
    <div class="logo-wrapper">
      <img src="CHAVE_LOGO" alt="Logo" class="logo">
    </div>
    
    <div class="eyebrow">CHAVE_EYEBROW</div>
    
    <h1 class="title">
      CHAVE_TITULO_LINHA_1<br>
      CHAVE_TITULO_LINHA_2<br>
      CHAVE_TITULO_LINHA_3
    </h1>
    
    <p class="subtitle">CHAVE_SUBTITULO</p>
    
    <button class="btn">CHAVE_BOTAO</button>
  </div>

  <div class="col-img">
    <img src="CHAVE_IMAGEM" alt="Marmita">
  </div>

</div>

</body>
</html>
