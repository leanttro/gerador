<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHAVE_NOME_TEMPLATE</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: CHAVE_COR_FUNDO;
  --text: CHAVE_COR_TEXTO;
  --brand: CHAVE_COR_BOTAO;
  --btn-text: CHAVE_COR_TEXTO_BOTAO;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  width: 100vw;
  height: 100vh;
  background-color: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

.container {
  width: 100%;
  height: 100%;
  display: flex;
  gap: 2vw;
  padding: 4vw;
  background-color: var(--bg);
  max-width: 1600px;
}

.col-text {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  opacity: 0;
  animation: fadeRight 0.8s ease-out forwards;
}

.eyebrow {
  font-size: clamp(0.7rem, 1vw, 1rem);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 2vh;
  font-weight: 600;
  opacity: 0.7;
}

.title {
  font-family: 'Montserrat', sans-serif;
  font-size: clamp(3rem, 5vw, 6.5rem);
  font-weight: 900;
  line-height: 0.95;
  margin-bottom: 3vh;
  text-transform: uppercase;
  letter-spacing: -1px;
}

.subtitle {
  font-size: clamp(1.1rem, 1.5vw, 1.8rem);
  line-height: 1.4;
  margin-bottom: 4vh;
  font-weight: 400;
  max-width: 90%;
}

.benefits {
  list-style: none;
  margin-bottom: 5vh;
  display: flex;
  flex-direction: column;
  gap: 1vh;
}

.benefits li {
  font-size: clamp(1rem, 1.3vw, 1.6rem);
  font-weight: 700;
}

.btn {
  align-self: flex-start;
  background-color: var(--brand);
  color: var(--btn-text);
  font-family: 'Montserrat', sans-serif;
  font-weight: 800;
  font-size: clamp(1rem, 1.4vw, 1.6rem);
  padding: 2vh 3vw;
  border-radius: 8px;
  text-transform: none;
  border: none;
  box-shadow: 0 8px 24px rgba(0,0,0,0.15);
  cursor: pointer;
  transition: transform 0.3s ease;
  animation: pulseBtn 2.5s infinite;
}

.col-images {
  flex: 1.5;
  display: flex;
  gap: 2vw;
  align-items: center;
  justify-content: center;
}

.img-wrapper {
  flex: 1;
  height: 80vh;
  border-radius: 24px;
  overflow: hidden;
  position: relative;
  box-shadow: 0 12px 36px rgba(0,0,0,0.1);
  opacity: 0;
  transform: translateY(40px);
}

.img-wrapper.delay-1 {
  animation: fadeUp 0.8s ease-out 0.2s forwards;
}

.img-wrapper.delay-2 {
  animation: fadeUp 0.8s ease-out 0.4s forwards;
}

.img-wrapper img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 10s ease;
}

.img-wrapper:hover img {
  transform: scale(1.05);
}

.floating-tag {
  position: absolute;
  top: 5%;
  left: 5%;
  background-color: #fff;
  color: #000;
  font-family: 'Montserrat', sans-serif;
  font-weight: 800;
  font-size: clamp(0.9rem, 1.2vw, 1.4rem);
  padding: 1.5vh 2vw;
  border-radius: 12px;
  max-width: 80%;
  line-height: 1.2;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  animation: floatTag 4s ease-in-out infinite;
}

@keyframes fadeRight {
  0% { opacity: 0; transform: translateX(-40px); }
  100% { opacity: 1; transform: translateX(0); }
}

@keyframes fadeUp {
  0% { opacity: 0; transform: translateY(40px); }
  100% { opacity: 1; transform: translateY(0); }
}

@keyframes pulseBtn {
  0% { transform: scale(1); }
  50% { transform: scale(1.03); }
  100% { transform: scale(1); }
}

@keyframes floatTag {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-8px); }
  100% { transform: translateY(0px); }
}
</style>
</head>
<body>

<div class="container">
  
  <div class="col-text">
    <div class="eyebrow">CHAVE_EYEBROW</div>
    
    <h1 class="title">
      CHAVE_TITULO_LINHA_1<br>
      CHAVE_TITULO_LINHA_2<br>
      CHAVE_TITULO_LINHA_3
    </h1>
    
    <p class="subtitle">CHAVE_SUBTITULO</p>
    
    <ul class="benefits">
      <li>CHAVE_BENEFICIO_1</li>
      <li>CHAVE_BENEFICIO_2</li>
      <li>CHAVE_BENEFICIO_3</li>
    </ul>
    
    <button class="btn">CHAVE_BOTAO</button>
  </div>

  <div class="col-images">
    <div class="img-wrapper delay-1">
      <img src="CHAVE_IMG_1" alt="Imagem 1">
    </div>
    
    <div class="img-wrapper delay-2">
      <div class="floating-tag">CHAVE_TAG_IMAGEM</div>
      <img src="CHAVE_IMG_2" alt="Imagem 2">
    </div>
  </div>

</div>

</body>
</html>
