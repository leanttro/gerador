<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Marmita Fit Ultra-Clean Motion</title>
    <style>
        /* ==============================
           CONFIGURAÇÕES GERAIS E CLEAN
           ============================== */
        :root {
            --cor-fundo: #FFFFFF; /* Branco Absoluto, Super Clean */
            --cor-texto-principal: #333333; /* Cinza Escuro Chic */
            --cor-destaque: #4CAF50; /* Verde Fit para acentos */
            --cor-destaque-secundaria: #888888; /* Cinza Médio para info */
            --fonte-principal: 'Poppins', sans-serif; /* Fonte moderna e limpa */
            
            /* Velocidade rápida para as animações - POUCO, mas CHIQUE */
            --velocidade-animacao-fast: 0.25s; 
            --velocidade-animacao-normal: 0.5s;
        }

        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--cor-fundo);
            color: var(--cor-texto-principal);
            font-family: var(--fonte-principal);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; /* Mantém a animação limpa */
        }

        /* ==============================
           CONTAINER PRINCIPAL - PROPORÇÃO 4:5
           ============================== */
        .template-motion-container {
            width: 400px; /* Largura base para 4:5 */
            height: 500px; /* Altura base para 4:5 */
            background-color: var(--cor-fundo);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 25px;
            /* Sombra ultra sutil para dar acabamento chique */
            box-shadow: 0 5px 20px rgba(0,0,0,0.03); 
        }

        /* ==============================
           HEADER - LOGO DA CLIENTE
           ============================== */
        .template-header {
            width: 100%;
            height: 50px;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            margin-bottom: 20px;
            position: relative;
            z-index: 10;
            
            /* Rota da IA: Animação de entrada rápida */
            animation: fadeInTop var(--velocidade-animacao-fast) ease-out forwards;
        }
        
        .cliente-logo {
            max-width: 120px;
            max-height: 100%;
            object-fit: contain;
        }

        /* ==============================
           MAIN SECTION - O "MOTION" POOOORRAAAA
           ============================== */
        .template-main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            position: relative;
        }

        /* CONTAINER DO VÍDEO PRINCIPAL (FOTO/MOTION CENTRAL) */
        .motion-scene-container {
            width: 100%;
            height: 280px; /* Espaço para o vídeo/motion */
            position: relative;
            margin-bottom: 15px;
            border-radius: 10px; /* Cantos arredondados sutis */
            background-color: transparent; /* Mantém o fundo branco */
            
            /* Animação de entrada rápida e escala sutil */
            animation: fadeInFast var(--velocidade-animacao-normal) ease-out forwards,
                       bob var(--velocidade-animacao-normal) ease-in-out infinite alternate calc(var(--velocidade-animacao-normal) * 2);
        }

        .main-product-video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ajusta o vídeo/motion à área */
            border-radius: 10px;
        }

        /* ELEMENTOS EM CAMADAS SOBRE O VÍDEO (Inspirado no image_faad60.png) */
        .layered-graphic-element {
            position: absolute;
            width: 60px;
            height: 60px;
            pointer-events: none; /* Não interfere no clique */
            border: 2px solid var(--cor-destaque);
            border-radius: 5px;
            opacity: 0.15;
            
            /* Animação de loop sutil */
            animation: rotateLoop 4s linear infinite,
                       pulseFast 0.8s ease-in-out infinite alternate;
        }

        /* Posicionamentos dos elementos gráficos */
        .element-top-right { top: 10px; right: 10px; animation-delay: 0.1s; }
        .element-bottom-left { bottom: 10px; left: 10px; animation-delay: 0.3s; }

        /* ==============================
           TEXT DETAILS (INFOS DO PRATO ANIMADAS)
           ============================== */
        .text-details {
            width: 100%;
            text-align: left;
            position: relative;
            z-index: 10;
        }

        .dish-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--cor-texto-principal);
            margin-bottom: 4px;
            letter-spacing: -0.5px;
            opacity: 0;
            
            /* Rota da IA: Animação de entrada rápida */
            animation: fadeInText var(--velocidade-animacao-fast) ease-out calc(var(--velocidade-animacao-normal) + 0.1s) forwards;
        }

        .ingredients-list {
            font-size: 13px;
            font-weight: 300;
            color: var(--cor-texto-principal);
            line-height: 1.4;
            margin-bottom: 10px;
            opacity: 0;
            
            /* Rota da IA: Animação de entrada rápida */
            animation: fadeInText var(--velocidade-animacao-fast) ease-out calc(var(--velocidade-animacao-normal) + 0.2s) forwards;
        }

        /* MINI MACROS INFO (DISCRETO, MAS MOVIMENTADO) */
        .macros-info {
            display: flex;
            gap: 10px;
            font-size: 11px;
            color: var(--cor-destaque-secundaria);
            font-weight: 400;
            margin-bottom: 5px;
            opacity: 0;
            
            /* Rota da IA: Animação de entrada rápida */
            animation: fadeInText var(--velocidade-animacao-fast) ease-out calc(var(--velocidade-animacao-normal) + 0.3s) forwards;
        }

        .macro-tag {
            background-color: rgba(76, 175, 80, 0.05); /* Verde muito sutil */
            padding: 2px 6px;
            border-radius: 3px;
        }

        /* ==============================
           FOOTER (PREÇO E CTA - POUCO, MAS CHIQUE)
           ============================== */
        .template-footer {
            margin-top: auto;
            text-align: center;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: var(--cor-destaque-secundaria);
            position: relative;
            z-index: 10;
        }

        .cta-text {
            color: var(--cor-destaque-secundaria);
            font-weight: 300;
            opacity: 0;
            
            /* Rota da IA: Animação de entrada rápida */
            animation: fadeInLeft var(--velocidade-animacao-fast) ease-out calc(var(--velocidade-animacao-normal) + 0.4s) forwards;
        }

        /* ==============================
           DEFINIÇÃO DAS ANIMAÇÕES (MOTO POOOORRAAAA)
           ============================== */
        
        /* Entrada Rápida (Sutil) */
        @keyframes fadeInFast { to { opacity: 1; transform: scale(1); } }
        
        /* Entrada do Header */
        @keyframes fadeInTop {
            0% { opacity: 0; transform: translateY(-20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Entrada do Texto (Da Esquerda) */
        @keyframes fadeInText {
            0% { opacity: 0; transform: translateX(10px); }
            100% { opacity: 1; transform: translateX(0); }
        }

        /* Entrada da Direita (Preço) */
        @keyframes fadeInRight {
            0% { opacity: 0; transform: translateX(20px); }
            100% { opacity: 1; transform: translateX(0); }
        }

        /* Entrada da Esquerda (CTA) */
        @keyframes fadeInLeft {
            0% { opacity: 0; transform: translateX(-20px); }
            100% { opacity: 1; transform: translateX(0); }
        }

        /* Efeito de Flutuação Contínuo (Mínimo, Chique) */
        @keyframes bob {
            0% { transform: translateY(0px); }
            100% { transform: translateY(5px); }
        }
        
        /* Pulso Rápido e Chique */
        @keyframes pulseFast {
            0% { opacity: 0.1; }
            100% { opacity: 0.25; }
        }

        /* Rotação Contínua (Inspirado no image_faad60.png) */
        @keyframes rotateLoop {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

    </style>
</head>
<body>

    <div class="template-motion-container" id="fit-marmita-app">

        <header class="template-header" id="logo-container">
            <img src="" alt="Logo Cliente" class="cliente-logo" id="client-logo-img">
        </header>

        <main class="template-main" id="motion-main-content">

            <div class="motion-scene-container" id="video-scene">
                <video autoplay loop muted playsinline id="main-product-video" class="main-product-video">
                    <source src="" type="video/mp4" id="video-source">
                    Seu navegador não suporta vídeos.
                </video>
                
                <div class="layered-graphic-element element-top-right"></div>
                <div class="layered-graphic-element element-bottom-left"></div>
            </div>

            <div class="text-details" id="text-details-container">
                <h1 class="dish-title" id="dish-title-text">{{TITULO}}</h1>
                
                <p class="ingredients-list" id="ingredients-list-text">
                    {{INGREDIENTES}}
                </p>
                
                <div class="macros-info" id="macros-info-tags">
                    {{MACROS}}
                </div>
            </div>

        </main>

        <footer class="template-footer" id="footer-container">
            <span class="cta-text" id="cta-footer-text">Peça pelo WhatsApp</span>
        </footer>

    </div>

    <script>
        // Função para atualizar o prato no template.
        // Chame essa função com os novos dados para carregar dinamicamente.
        // O app deve enviar um objeto com as rotas.
        
        function updateMotionTemplate(data) {
            // Atualizar Logo
            if (data.client_logo_url) {
                document.getElementById('client-logo-img').src = data.client_logo_url;
            } else {
                // Placeholder padrão se não houver logo
                document.getElementById('client-logo-img').src = "https://via.placeholder.com/120x50/FFFFFF/4CAF50?text=FIT+MARMITA";
            }
            
            // Atualizar Vídeo/Motion
            if (data.product_video_url) {
                const videoSource = document.getElementById('video-source');
                const mainVideo = document.getElementById('main-product-video');
                videoSource.src = data.product_video_url;
                mainVideo.load(); // Recarrega o vídeo com o novo source
            } else {
                // Placeholder padrão se não houver vídeo
                const videoSource = document.getElementById('video-source');
                const mainVideo = document.getElementById('main-product-video');
                videoSource.src = "https://via.placeholder.com/400x280/FFFFFF/4CAF50?text=MOTION+HERE"; // Ou um vídeo placeholder
                mainVideo.load();
            }
            
            // Atualizar Textos
            document.getElementById('dish-title-text').innerText = data.product_name || "Frango Xadrez Fit";
            document.getElementById('ingredients-list-text').innerText = data.product_description || "Cubos de frango grelhados, brócolis fresh, batata doce assada, pimentões coloridos e molho shoyu suave.";
            
            // Macros Info
            document.getElementById('macros-info-tags').innerText = data.macros_info_string || "420 kcal | P: 35g | C: 45g | G: 10g";
        }

        // --- EXEMPLO DE USO AUTOMÁTICO PARA TESTE ---

            product_name: "Salmão Grelhado no Limão", // MUDAR TÍTULO
            product_description: "Filé de salmão com aspargos assados, cenouras baby caramelizadas e quinoa real.", // MUDAR LISTA
            macros_info_string: "480 kcal | P: 40g | C: 30g | G: 20g" // MUDAR MACROS
        };

</body>
</html>
