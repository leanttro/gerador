<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Bastidores</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --cor-fundo: #FFFFFF;
            --cor-texto-principal: #1A1A1A;
            --cor-destaque: #C5A059;
            --cor-destaque-secundaria: #7A7A7A;
            --fonte-principal: 'Montserrat', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--cor-fundo);
            color: var(--cor-texto-principal);
            font-family: var(--fonte-principal);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* ==============================
           CONTAINER PRINCIPAL — 4:5
           ============================== */
        .container {
            width: 400px;
            height: 500px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ==============================
           IMAGEM — OCUPA TUDO
           ============================== */
        .bg-image {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            z-index: 0;
        }

        /* ==============================
           OVERLAY ESCURO GRADIENTE
           ============================== */
        .overlay {
            position: absolute;
            inset: 0;
            z-index: 1;
            background: linear-gradient(
                to bottom,
                rgba(0,0,0,0.08) 0%,
                rgba(0,0,0,0.12) 30%,
                rgba(0,0,0,0.62) 68%,
                rgba(0,0,0,0.82) 100%
            );
        }

        /* ==============================
           FAIXA LATERAL ESQUERDA — BASTIDORES
           ============================== */
        .side-label {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%) rotate(-90deg);
            transform-origin: center center;
            z-index: 5;
            font-size: 8px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--cor-destaque);
            opacity: 0.55;
            white-space: nowrap;
        }

        /* ==============================
           LINHA DESTAQUE TOPO
           ============================== */
        .top-line {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--cor-destaque);
            z-index: 5;
        }

        /* ==============================
           HEADER — LOGO
           ============================== */
        .header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            padding: 0 24px;
        }

        .logo {
            max-width: 180px;
            max-height: 60px;
            object-fit: contain;
            filter: brightness(0) invert(1);
            opacity: 0.92;
        }

        /* ==============================
           BADGE BASTIDORES
           ============================== */
        .badge {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
            border: 1.5px solid var(--cor-destaque);
            padding: 4px 12px;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: var(--cor-destaque);
            background: rgba(0,0,0,0.25);
        }

        /* ==============================
           BLOCO DE TEXTO — RODAPÉ
           ============================== */
        .bottom-block {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 10;
            padding: 0 24px 28px 24px;
        }

        /* Linha decorativa antes do título */
        .bottom-block::before {
            content: '';
            display: block;
            width: 36px;
            height: 2px;
            background: var(--cor-destaque);
            margin-bottom: 14px;
        }

        .titulo {
            font-size: 22px;
            font-weight: 900;
            line-height: 1.15;
            letter-spacing: -0.5px;
            color: #ffffff;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .subtexto {
            font-size: 11px;
            font-weight: 400;
            color: rgba(255,255,255,0.65);
            letter-spacing: 0.3px;
            line-height: 1.5;
        }

        /* ==============================
           GRID DECORATIVO — CANTO INFERIOR DIREITO
           ============================== */
        .grid-deco {
            position: absolute;
            bottom: 24px;
            right: 22px;
            z-index: 10;
            display: grid;
            grid-template-columns: repeat(3, 5px);
            grid-template-rows: repeat(3, 5px);
            gap: 4px;
            opacity: 0.35;
        }

        .grid-deco span {
            width: 5px;
            height: 5px;
            background: var(--cor-destaque);
            display: block;
        }

        /* ==============================
           FRAME CANTO — EFEITO FOTOGRÁFICO
           ============================== */
        .corner-tl,
        .corner-br {
            position: absolute;
            width: 22px;
            height: 22px;
            z-index: 5;
        }

        .corner-tl {
            top: 14px;
            left: 14px;
            border-top: 1.5px solid var(--cor-destaque);
            border-left: 1.5px solid var(--cor-destaque);
            opacity: 0.45;
        }

        .corner-br {
            bottom: 14px;
            right: 14px;
            border-bottom: 1.5px solid var(--cor-destaque);
            border-right: 1.5px solid var(--cor-destaque);
            opacity: 0.45;
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- Linha topo -->
        <div class="top-line"></div>

        <!-- Faixa lateral -->
        <span class="side-label">bastidores</span>

        <!-- Cantos decorativos -->
        <div class="corner-tl"></div>
        <div class="corner-br"></div>

        <!-- Imagem de fundo -->
        <img src="CHAVE_IMAGEM" alt="Bastidores" class="bg-image">

        <!-- Overlay -->
        <div class="overlay"></div>

        <!-- Header com logo -->
        <header class="header">
            <img src="CHAVE_LOGO" alt="Logo" class="logo">
        </header>

        <!-- Badge -->
        <div class="badge">Bastidores</div>

        <!-- Texto inferior -->
        <div class="bottom-block">
            <h1 class="titulo">CHAVE_TITULO</h1>
            <p class="subtexto">CHAVE_SUBTEXTO</p>
        </div>

        <!-- Grid decorativo -->
        <div class="grid-deco">
            <span></span><span></span><span></span>
            <span></span><span></span><span></span>
            <span></span><span></span><span></span>
        </div>

    </div>

</body>
</html>
