<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Bastidores</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --cor-fundo: CHAVE_COR_FUNDO;
            --cor-texto-principal: CHAVE_COR_TEXTO;
            --cor-destaque: CHAVE_COR_DESTAQUE;
            --cor-destaque-secundaria: CHAVE_COR_SECUNDARIA;
            --fonte-principal: 'Montserrat', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--cor-fundo);
            color: var(--cor-texto-principal);
            font-family: var(--fonte-principal);
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* ==============================
           CONTAINER — RESPONSIVO 4:5 E 9:16
           Ocupa 100% do viewport sem distorcer.
           O backend renderiza na resolução certa
           (ex: 1080x1350 para 4:5 ou 1080x1920 para 9:16)
           e o layout escala fluido via vw/vh/clamp.
           ============================== */
        .container {
            width: 100vw;
            height: 100vh;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ==============================
           IMAGEM — OCUPA TUDO
           ============================== */
        .bg-image {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            z-index: 0;
        }

        /* ==============================
           OVERLAY ESCURO GRADIENTE
           ============================== */
        .overlay {
            position: absolute;
            inset: 0;
            z-index: 1;
            background: linear-gradient(
                to bottom,
                rgba(0,0,0,0.08) 0%,
                rgba(0,0,0,0.12) 30%,
                rgba(0,0,0,0.62) 68%,
                rgba(0,0,0,0.82) 100%
            );
        }

        /* ==============================
           FAIXA LATERAL ESQUERDA
           ============================== */
        .side-label {
            position: absolute;
            left: 2.5vw;
            top: 50%;
            transform: translateY(-50%) rotate(-90deg);
            transform-origin: center center;
            z-index: 5;
            font-size: clamp(7px, 1.1vw, 10px);
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--cor-destaque);
            opacity: 0.55;
            white-space: nowrap;
        }

        /* ==============================
           LINHA DESTAQUE TOPO
           ============================== */
        .top-line {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: clamp(2px, 0.4vh, 4px);
            background: var(--cor-destaque);
            z-index: 5;
        }

        /* ==============================
           HEADER — LOGO
           ============================== */
        .header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: clamp(60px, 14vh, 110px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            padding: 0 clamp(16px, 5vw, 40px);
        }

        .logo {
            max-width: clamp(110px, 38vw, 220px);
            max-height: clamp(38px, 9vh, 72px);
            object-fit: contain;
            filter: brightness(0) invert(1);
            opacity: 0.92;
        }

        /* ==============================
           BADGE BASTIDORES
           ============================== */
        .badge {
            position: absolute;
            top: clamp(14px, 3.5vh, 30px);
            right: clamp(14px, 3.5vw, 30px);
            z-index: 10;
            border: 1.5px solid var(--cor-destaque);
            padding: clamp(3px, 0.7vh, 6px) clamp(8px, 2.5vw, 16px);
            font-size: clamp(7px, 1.2vw, 10px);
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: var(--cor-destaque);
            background: rgba(0,0,0,0.25);
        }

        /* ==============================
           BLOCO DE TEXTO — RODAPÉ
           ============================== */
        .bottom-block {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 10;
            padding: 0 clamp(18px, 6vw, 40px) clamp(20px, 5.5vh, 48px) clamp(18px, 6vw, 40px);
        }

        .bottom-block::before {
            content: '';
            display: block;
            width: clamp(28px, 8vw, 44px);
            height: 2px;
            background: var(--cor-destaque);
            margin-bottom: clamp(10px, 2.8vh, 20px);
        }

        .titulo {
            font-size: clamp(15px, 5vw, 28px);
            font-weight: 900;
            line-height: 1.15;
            letter-spacing: -0.5px;
            color: #ffffff;
            margin-bottom: clamp(6px, 1.8vh, 14px);
            text-transform: uppercase;
        }

        .subtexto {
            font-size: clamp(9px, 2.2vw, 13px);
            font-weight: 400;
            color: rgba(255,255,255,0.65);
            letter-spacing: 0.3px;
            line-height: 1.5;
            margin-bottom: clamp(10px, 2.8vh, 20px);
        }

        .cta {
            font-size: clamp(7px, 1.8vw, 10px);
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: var(--cor-destaque);
        }

        /* ==============================
           GRID DECORATIVO
           ============================== */
        .grid-deco {
            position: absolute;
            bottom: clamp(20px, 5.5vh, 48px);
            right: clamp(16px, 4.5vw, 36px);
            z-index: 10;
            display: grid;
            grid-template-columns: repeat(3, clamp(4px, 1.1vw, 7px));
            grid-template-rows: repeat(3, clamp(4px, 1.1vw, 7px));
            gap: clamp(3px, 0.8vw, 5px);
            opacity: 0.35;
        }

        .grid-deco span {
            background: var(--cor-destaque);
            display: block;
        }

        /* ==============================
           FRAME CANTO
           ============================== */
        .corner-tl,
        .corner-br {
            position: absolute;
            width: clamp(14px, 4vw, 26px);
            height: clamp(14px, 4vw, 26px);
            z-index: 5;
        }

        .corner-tl {
            top: clamp(10px, 2.5vh, 20px);
            left: clamp(10px, 2.5vw, 20px);
            border-top: 1.5px solid var(--cor-destaque);
            border-left: 1.5px solid var(--cor-destaque);
            opacity: 0.45;
        }

        .corner-br {
            bottom: clamp(10px, 2.5vh, 20px);
            right: clamp(10px, 2.5vw, 20px);
            border-bottom: 1.5px solid var(--cor-destaque);
            border-right: 1.5px solid var(--cor-destaque);
            opacity: 0.45;
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="top-line"></div>
        <span class="side-label">bastidores</span>
        <div class="corner-tl"></div>
        <div class="corner-br"></div>

        <img src="CHAVE_IMAGEM" alt="Bastidores" class="bg-image">
        <div class="overlay"></div>

        <header class="header">
            <img src="CHAVE_LOGO" alt="Logo" class="logo">
        </header>

        <div class="badge">Bastidores</div>

        <div class="bottom-block">
            <h1 class="titulo">CHAVE_TITULO</h1>
            <p class="subtexto">CHAVE_SUBTEXTO</p>
            <p class="cta">CHAVE_CTA</p>
        </div>

        <div class="grid-deco">
            <span></span><span></span><span></span>
            <span></span><span></span><span></span>
            <span></span><span></span><span></span>
        </div>

    </div>

</body>
</html>
