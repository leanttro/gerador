<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Pedidos | Motor Dark Studio</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg: #0a0a0a;
  --surface: #111111;
  --border: rgba(255,255,255,0.1);
  --text: #f0f0f0;
  --muted: #888;
  --accent: #7C3AED;
  --green: #22c55e;
  --red: #ef4444;
  --radius: 8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  padding: 40px;
  font-size: 14px;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 30px;
  flex-wrap: wrap;
  gap: 20px;
}

h1 { font-size: 24px; font-weight: 700; }

.actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.btn {
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
  padding: 10px 16px;
  border-radius: var(--radius);
  cursor: pointer;
  font-family: inherit;
  font-weight: 500;
  transition: all 0.2s;
}

.btn:hover {
  border-color: var(--muted);
}

.btn-green { background: var(--green); color: #000; border-color: var(--green); }
.btn-green:hover { filter: brightness(1.1); }

.btn-red { background: var(--red); color: #fff; border-color: var(--red); }
.btn-red:hover { filter: brightness(1.1); }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(450px, 1fr));
  gap: 20px;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--border);
  padding-bottom: 10px;
}

.card-header label {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  font-weight: bold;
}

.images-preview {
  display: flex;
  gap: 10px;
}

.img-box {
  flex: 1;
  border: 1px dashed var(--border);
  border-radius: 4px;
  padding: 10px;
  text-align: center;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 10px;
  background: rgba(0,0,0,0.3);
}

.img-box img {
  max-width: 100%;
  max-height: 120px;
  object-fit: contain;
  border-radius: 4px;
}

.img-box a {
  color: var(--text);
  text-decoration: none;
  font-size: 12px;
  background: var(--border);
  padding: 5px 10px;
  border-radius: 4px;
  transition: 0.2s;
}

.img-box a:hover {
  background: var(--muted);
  color: #fff;
}

textarea {
  width: 100%;
  background: #000;
  color: var(--green);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 10px;
  font-family: monospace;
  font-size: 13px;
  resize: vertical;
  min-height: 250px;
  line-height: 1.4;
}

.input-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.input-group label {
  font-weight: 500;
  color: var(--muted);
}

input[type="text"] {
  background: #000;
  color: var(--text);
  border: 1px solid var(--border);
  padding: 10px;
  border-radius: 4px;
  font-family: inherit;
}

.empty-state {
  text-align: center;
  padding: 60px;
  color: var(--muted);
  grid-column: 1 / -1;
  font-size: 16px;
  border: 1px dashed var(--border);
  border-radius: var(--radius);
}
</style>
</head>
<body>

<div class="header">
  <h1>Painel de Pedidos</h1>
  <div class="actions">
    <button class="btn" onclick="toggleSelectAll()">Selecionar Tudo</button>
    <button class="btn btn-red" onclick="deleteSelected()">Excluir Selecionados</button>
    <button class="btn btn-red" onclick="deleteAll()">Excluir Todos</button>
    <button class="btn btn-green" onclick="exportXLSX(true)">Exportar Selecionados (XLSX)</button>
    <button class="btn btn-green" onclick="exportXLSX(false)">Exportar Todos (XLSX)</button>
  </div>
</div>

<div class="grid" id="pedidos-grid"></div>

<script>
  let pedidosData = JSON.parse(localStorage.getItem('pedidos')) || [];

  function saveToLocalStorage() {
    localStorage.setItem('pedidos', JSON.stringify(pedidosData));
  }

  function generateDefaultPrompt(p) {
    const colors = p.colors || {};
    const fields = p.fields || {};
    
    return `CHAVE_COR_FUNDO: ${colors.fundo || ''}
CHAVE_COR_TEXTO: ${colors.texto || ''}
CHAVE_COR_DESTAQUE: ${colors.destaque || ''}
CHAVE_COR_SECUNDARIA: ${colors.secundaria || ''}
CHAVE_NOME_EMPRESA: ${fields.empresa || ''}
CHAVE_LOGO: logo
CHAVE_IMAGEM: imagem
CHAVE_TITULO: ${fields.titulo || ''}
CHAVE_INGREDIENTES: ${fields.ingredientes || ''}
CHAVE_RESULTADO: ${fields.resultado || ''}
CHAVE_MACROS: ${fields.macros || ''}
CHAVE_CTA: ${fields.cta || ''}`;
  }

  function renderGrid() {
    const grid = document.getElementById('pedidos-grid');
    grid.innerHTML = '';

    if (pedidosData.length === 0) {
      grid.innerHTML = '<div class="empty-state">Nenhum pedido encontrado no sistema.</div>';
      return;
    }

    pedidosData.forEach((p, index) => {
      const assets = p.assets || [];
      const logoSrc = assets.length > 0 ? assets[0] : '';
      const imgSrc = assets.length > 1 ? assets[1] : '';

      if (p.customPrompt === undefined) {
        p.customPrompt = generateDefaultPrompt(p);
      }
      if (p.template === undefined) {
        p.template = "Foto Produto";
      }
      if (p.selected === undefined) {
        p.selected = false;
      }

      const card = document.createElement('div');
      card.className = 'card';
      
      card.innerHTML = `
        <div class="card-header">
          <label>
            <input type="checkbox" ${p.selected ? 'checked' : ''} onchange="updateSelection(${index}, this.checked)" style="transform: scale(1.2);">
            Pedido #${index + 1} - ${p.fields?.empresa || 'Sem Nome'}
          </label>
          <button onclick="deleteSingle(${index})" style="padding: 5px 10px; font-size: 12px; font-weight: bold;" class="btn btn-red">X</button>
        </div>

        <div class="images-preview">
          <div class="img-box">
            ${logoSrc ? `<img src="${logoSrc}" alt="Logo"><a href="${logoSrc}" download="logo_pedido_${index + 1}.png" target="_blank">Download Logo</a>` : '<span style="color:var(--muted)">Sem Logo</span>'}
          </div>
          <div class="img-box">
            ${imgSrc ? `<img src="${imgSrc}" alt="Imagem"><a href="${imgSrc}" download="imagem_pedido_${index + 1}.png" target="_blank">Download Imagem</a>` : '<span style="color:var(--muted)">Sem Imagem</span>'}
          </div>
        </div>

        <div class="input-group">
          <label>Estrutura do Prompt (Edite antes de exportar):</label>
          <textarea onchange="updatePrompt(${index}, this.value)">${p.customPrompt}</textarea>
        </div>

        <div class="input-group">
          <label>Template Base:</label>
          <input type="text" value="${p.template}" onchange="updateTemplate(${index}, this.value)">
        </div>
      `;
      grid.appendChild(card);
    });
    saveToLocalStorage();
  }

  function updateSelection(index, isChecked) {
    pedidosData[index].selected = isChecked;
    saveToLocalStorage();
  }

  function updatePrompt(index, value) {
    pedidosData[index].customPrompt = value;
    saveToLocalStorage();
  }

  function updateTemplate(index, value) {
    pedidosData[index].template = value;
    saveToLocalStorage();
  }

  function toggleSelectAll() {
    const allSelected = pedidosData.length > 0 && pedidosData.every(p => p.selected);
    pedidosData.forEach(p => p.selected = !allSelected);
    renderGrid();
  }

  function deleteSingle(index) {
    if(confirm('Tem certeza que deseja excluir permanentemente este pedido?')) {
      pedidosData.splice(index, 1);
      renderGrid();
    }
  }

  function deleteSelected() {
    const selectedCount = pedidosData.filter(p => p.selected).length;
    if (selectedCount === 0) return alert('Nenhum pedido selecionado para exclusão.');
    
    if(confirm(`Você está prestes a excluir ${selectedCount} pedido(s). Confirmar?`)) {
      pedidosData = pedidosData.filter(p => !p.selected);
      renderGrid();
    }
  }

  function deleteAll() {
    if(confirm('ATENÇÃO: Você vai excluir TODOS os pedidos salvos no painel. Esta ação não pode ser desfeita. Deseja continuar?')) {
      pedidosData = [];
      renderGrid();
    }
  }

  function extractFilename(url, defaultName) {
    if (!url) return '';
    if (url.startsWith('data:')) return defaultName;
    try {
      return url.split('/').pop().split('?')[0] || defaultName;
    } catch {
      return defaultName;
    }
  }

  function exportXLSX(selectedOnly) {
    const toExport = selectedOnly ? pedidosData.filter(p => p.selected) : pedidosData;

    if (toExport.length === 0) {
      alert('Nenhum pedido disponível para exportação.');
      return;
    }

    const dataForExcel = toExport.map((p, i) => {
      const assets = p.assets || [];
      const logoUrl = assets.length > 0 ? assets[0] : '';
      const imgUrl = assets.length > 1 ? assets[1] : '';

      const logoName = logoUrl ? extractFilename(logoUrl, `logo.png`) : '';
      const imgName = imgUrl ? extractFilename(imgUrl, `imagem.jpeg`) : '';

      return {
        "prompt": p.customPrompt,
        "logo": logoName,
        "imagem": imgName,
        "template": p.template
      };
    });

    const worksheet = XLSX.utils.json_to_sheet(dataForExcel);
    const workbook = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(workbook, worksheet, "Planilha1");

    XLSX.writeFile(workbook, "prompts.xlsx");
  }

  renderGrid();
</script>
</body>
</html>
