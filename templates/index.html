<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motor Dark | Gerador Front-End</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --netflix-red: #E50914;
            --netflix-red-hover: #F40612;
            --bg-base: #141414;
            --bg-card: #181818;
            --bg-input: #333333;
            --text-main: #FFFFFF;
            --text-muted: #B3B3B3;
            --border-color: #404040;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }
        
        .sidebar {
            width: 400px;
            background-color: var(--bg-card);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }
        
        .sidebar h1 {
            color: var(--netflix-red);
            font-size: 24px;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 30px;
        }
        
        .section {
            margin-bottom: 25px;
            padding-bottom: 25px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .section h2 {
            font-size: 16px;
            margin-bottom: 15px;
            color: var(--text-muted);
        }
        
        input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background-color: var(--bg-input);
            color: var(--text-main);
            margin-bottom: 10px;
            resize: vertical;
        }
        
        input[type="file"] {
            margin-bottom: 15px;
            width: 100%;
        }
        
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            background-color: var(--netflix-red);
            color: #fff;
            width: 100%;
            font-size: 14px;
            transition: background 0.2s;
        }
        
        .btn:hover {
            background-color: var(--netflix-red-hover);
        }
        
        .btn-secondary {
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            margin-top: 10px;
        }
        
        .btn-secondary:hover {
            background-color: #404040;
        }
        
        .asset-list {
            list-style: none;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 15px;
        }
        
        .asset-list li {
            background: var(--bg-input);
            padding: 8px;
            margin-bottom: 5px;
            border-radius: 4px;
            word-break: break-all;
        }
        
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #000;
            position: relative;
        }
        
        .toolbar {
            height: 60px;
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }
        
        .preview-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: auto;
        }
        
        iframe {
            width: 360px;
            height: 640px;
            border: 1px solid var(--border-color);
            background: #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        
        #loadingSpinner {
            display: none;
            margin: 10px auto;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255,255,255,0.1);
            border-left-color: var(--netflix-red);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1>Motor Dark</h1>
        
        <div class="section">
            <h2>1. Seus Assets</h2>
            <input type="file" id="fileUpload" multiple accept="image/*,video/*">
            <button class="btn btn-secondary" onclick="uploadFiles()">Enviar Arquivos</button>
            <ul class="asset-list" id="assetList" style="margin-top: 15px;"></ul>
        </div>
        
        <div class="section">
            <h2>2. Geração e Alteração</h2>
            <textarea id="promptInput" rows="5" placeholder="Descreva como deve ser o vídeo/animação. Ex: Faça um carrossel animado escuro usando minha logo..."></textarea>
            <button class="btn" onclick="generateCode()">Gerar / Atualizar Código</button>
            <div id="loadingSpinner"></div>
        </div>
        
        <div class="section" style="border:none;">
            <h2>3. Código Fonte</h2>
            <button class="btn btn-secondary" onclick="toggleCodeView()">Ver/Esconder Código</button>
            <textarea id="codeEditor" rows="10" style="display:none; margin-top:10px; font-family:monospace; font-size:11px; white-space:pre;" onchange="updateIframeFromEditor()"></textarea>
        </div>
    </div>
    
    <div class="main-content">
        <div class="toolbar">
            <div style="color: var(--text-muted); font-size: 14px;">Preview 9:16</div>
            <div style="display:flex; gap:10px;">
                <button class="btn" style="width:auto; padding:8px 15px;" onclick="downloadHTML()">Baixar HTML</button>
                <button class="btn" style="width:auto; padding:8px 15px; background-color: #28a745;" onclick="recordScreen()">Gravar Vídeo</button>
            </div>
        </div>
        <div class="preview-container">
            <iframe id="previewFrame" sandbox="allow-scripts allow-same-origin"></iframe>
        </div>
    </div>

    <script>
        let currentAssets = [];
        let currentHTML = "";
        let mediaRecorder;
        let recordedChunks = [];

        async function uploadFiles() {
            const fileInput = document.getElementById('fileUpload');
            const files = fileInput.files;
            
            if (files.length === 0) return;
            
            for (let i = 0; i < files.length; i++) {
                const formData = new FormData();
                formData.append('file', files[i]);
                
                try {
                    const response = await fetch('/api/upload', {
                        method: 'POST',
                        body: formData
                    });
                    
                    const data = await response.json();
                    if (data.success) {
                        const fullUrl = window.location.origin + data.url;
                        currentAssets.push(fullUrl);
                        updateAssetList();
                    }
                } catch (e) {
                    alert('Erro no upload: ' + files[i].name);
                }
            }
            fileInput.value = '';
        }

        function updateAssetList() {
            const list = document.getElementById('assetList');
            list.innerHTML = '';
            currentAssets.forEach(url => {
                const li = document.createElement('li');
                li.innerText = url;
                list.appendChild(li);
            });
        }

        async function generateCode() {
            const prompt = document.getElementById('promptInput').value;
            if (!prompt) return;
            
            document.getElementById('loadingSpinner').style.display = 'block';
            
            const payload = {
                prompt: prompt,
                assets: currentAssets,
                previous_code: currentHTML || null
            };
            
            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await response.json();
                if (data.success) {
                    currentHTML = data.html;
                    document.getElementById('codeEditor').value = currentHTML;
                    renderIframe(currentHTML);
                } else {
                    alert('Erro: ' + data.error);
                }
            } catch (e) {
                alert('Erro na requisição');
            }
            
            document.getElementById('loadingSpinner').style.display = 'none';
        }

        function renderIframe(htmlContent) {
            const iframe = document.getElementById('previewFrame');
            iframe.srcdoc = htmlContent;
        }

        function toggleCodeView() {
            const editor = document.getElementById('codeEditor');
            editor.style.display = editor.style.display === 'none' ? 'block' : 'none';
        }

        function updateIframeFromEditor() {
            currentHTML = document.getElementById('codeEditor').value;
            renderIframe(currentHTML);
        }

        function downloadHTML() {
            if (!currentHTML) return;
            const blob = new Blob([currentHTML], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'leanttro_animation.html';
            a.click();
            URL.revokeObjectURL(url);
        }

        async function recordScreen() {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { preferCurrentTab: true },
                    audio: true
                });
                
                recordedChunks = [];
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
                
                mediaRecorder.ondataavailable = function(e) {
                    if (e.data.size > 0) recordedChunks.push(e.data);
                };
                
                mediaRecorder.onstop = function() {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'leanttro_video.webm';
                    a.click();
                    URL.revokeObjectURL(url);
                    stream.getTracks().forEach(track => track.stop());
                };
                
                mediaRecorder.start();
                alert("Gravação iniciada. Dê play na sua animação dentro do iframe. Clique em 'Parar compartilhamento' no navegador quando finalizar.");
                
            } catch (err) {
                alert("Erro ao iniciar gravação de tela: " + err);
            }
        }
    </script>
</body>
</html>
