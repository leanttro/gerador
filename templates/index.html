<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motor Dark - Profissional</title>
    <style>
        /* mantido o estilo original, apenas adicionado novos campos */
        body {
            font-family: Arial, sans-serif;
            background-color: #0d0d0d;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: #1a1a1a;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-align: center;
            width: 100%;
            max-width: 500px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #00ffcc;
        }
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 12px;
            color: #888;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background-color: #333;
            color: white;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
        }
        textarea {
            resize: vertical;
            min-height: 60px;
        }
        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 6px;
            background-color: #00ffcc;
            color: #000;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #00b38f;
        }
        button:disabled {
            background-color: #555;
            color: #888;
            cursor: not-allowed;
        }
        #status {
            margin-top: 20px;
            font-size: 14px;
            color: #00ffcc;
            min-height: 20px;
        }
        #timer {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
        #videoContainer {
            margin-top: 30px;
            display: none;
            width: 100%;
        }
        video, img {
            width: 100%;
            border-radius: 8px;
            border: 2px solid #00ffcc;
        }
        .download-link {
            display: block;
            margin-top: 15px;
            color: #00ffcc;
            text-decoration: none;
            font-weight: bold;
        }
        .phrases-panel {
            background-color: #222;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            display: none;
            text-align: left;
        }
        .phrase-item {
            margin-bottom: 10px;
            padding: 8px;
            background: #2c2c2c;
            border-radius: 4px;
        }
        .phrase-item input {
            width: 100%;
            background: #3a3a3a;
            border: none;
            padding: 8px;
            color: white;
            border-radius: 4px;
        }
        .checkbox-group {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-top: 5px;
        }
        .checkbox-group label {
            display: inline;
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Painel de Controle Pro</h1>
        
        <div class="input-group">
            <label>Nicho do Canal</label>
            <input type="text" id="niche" placeholder="Ex: Curiosidades Históricas">
        </div>

        <div class="input-group">
            <label>Estilo Visual</label>
            <select id="visualStyle">
                <option value="clean, minimalista, cores suaves">Clean & Minimalista</option>
                <option value="moderno, cores vibrantes, design contemporâneo">Moderno</option>
                <option value="realista, pessoas reais, ambientes naturais">Realista com pessoas</option>
            </select>
        </div>

        <div class="input-group">
            <label>Texto adicional (telefone, endereço, empresa)</label>
            <textarea id="customText" placeholder="Ex: (11) 99999-9999 | contato@empresa.com"></textarea>
        </div>

        <div class="input-group">
            <label>Modo de Geração</label>
            <select id="mode">
                <option value="video">Vídeo Completo</option>
                <option value="carousel">Carrossel de Imagens</option>
                <option value="image">Apenas Imagens (sem frases)</option>
            </select>
        </div>

        <div class="input-group">
            <label>Provedor de Imagem</label>
            <select id="provider">
                <option value="pollinations">Pollinations (Rápido)</option>
                <option value="leonardo">Leonardo.ai (Alta qualidade)</option>
            </select>
        </div>

        <div class="input-group">
            <label>Formato (Ratio)</label>
            <select id="ratio">
                <option value="9:16">9:16 (Shorts/TikTok)</option>
                <option value="16:9">16:9 (YouTube)</option>
                <option value="1:1">1:1 (Instagram)</option>
                <option value="4:5">4:5 (Post)</option>
            </select>
        </div>

        <div class="input-group">
            <label>Sua Logo (PNG)</label>
            <input type="file" id="logo" accept="image/*">
        </div>

        <button id="btnGenerate" onclick="startProcess()">Executar Motor</button>
        
        <div id="status"></div>
        <div id="timer" style="display:none">Tempo estimado: <span id="sec">0</span>s</div>

        <!-- Painel para editar frases (aparece após gerar roteiro) -->
        <div id="phrasesPanel" class="phrases-panel">
            <h3>Edite as frases para cada imagem:</h3>
            <div id="phrasesList"></div>
            <button onclick="continueWithPhrases()">Continuar com estas frases</button>
        </div>

        <div id="videoContainer">
            <div id="mediaOutput"></div>
            <a id="downloadLink" class="download-link" href="#" download>Baixar Arquivo Final</a>
        </div>
    </div>

    <script>
        let currentPhrases = [];
        let currentSessionId = null;

        async function updateStatus() {
            if (!currentSessionId) return;
            try {
                const res = await fetch(`/status/${currentSessionId}`);
                const data = await res.json();
                document.getElementById('status').innerText = data.step;
                document.getElementById('sec').innerText = data.remaining;
                
                if (data.step === "Concluído" || data.step.includes("Erro")) {
                    clearInterval(window.statusInterval);
                    document.getElementById('timer').style.display = 'none';
                }
            } catch (e) {}
        }

        async function startProcess() {
            const niche = document.getElementById('niche').value;
            const logoFile = document.getElementById('logo').files[0];
            const mode = document.getElementById('mode').value;
            const provider = document.getElementById('provider').value;
            const ratio = document.getElementById('ratio').value;
            const visualStyle = document.getElementById('visualStyle').value;
            const customText = document.getElementById('customText').value;
            
            const statusDiv = document.getElementById('status');
            const btn = document.getElementById('btnGenerate');
            const videoContainer = document.getElementById('videoContainer');
            const phrasesPanel = document.getElementById('phrasesPanel');

            if (!niche) {
                statusDiv.innerText = 'Preencha o nicho primeiro';
                return;
            }

            const formData = new FormData();
            formData.append('niche', niche);
            formData.append('mode', mode);
            formData.append('provider', provider);
            formData.append('ratio', ratio);
            formData.append('visualStyle', visualStyle);
            formData.append('customText', customText);
            if (logoFile) formData.append('logo', logoFile);

            statusDiv.innerText = 'Gerando roteiro e frases...';
            btn.disabled = true;
            videoContainer.style.display = 'none';
            phrasesPanel.style.display = 'none';

            try {
                // Primeiro, gerar roteiro e frases (etapa 1)
                const scriptResponse = await fetch('/generate_script', {
                    method: 'POST',
                    body: formData
                });
                const scriptData = await scriptResponse.json();

                if (!scriptData.success) {
                    statusDiv.innerText = 'Erro: ' + scriptData.error;
                    btn.disabled = false;
                    return;
                }

                // Exibir painel de edição de frases
                currentPhrases = scriptData.phrases;
                currentSessionId = scriptData.session_id;

                const phrasesListDiv = document.getElementById('phrasesList');
                phrasesListDiv.innerHTML = '';
                currentPhrases.forEach((phrase, idx) => {
                    const div = document.createElement('div');
                    div.className = 'phrase-item';
                    div.innerHTML = `
                        <label>Imagem ${idx+1}:</label>
                        <input type="text" value="${escapeHtml(phrase)}" data-idx="${idx}" class="phrase-input">
                    `;
                    phrasesListDiv.appendChild(div);
                });

                phrasesPanel.style.display = 'block';
                statusDiv.innerText = 'Edite as frases acima e clique em "Continuar"';
                btn.disabled = false;
            } catch (error) {
                statusDiv.innerText = 'Erro na requisição inicial.';
                btn.disabled = false;
            }
        }

        async function continueWithPhrases() {
            // Coletar frases editadas
            const inputs = document.querySelectorAll('.phrase-input');
            const updatedPhrases = [];
            inputs.forEach(input => {
                updatedPhrases.push(input.value);
            });

            const btn = document.getElementById('btnGenerate');
            const statusDiv = document.getElementById('status');
            btn.disabled = true;
            statusDiv.innerText = 'Iniciando geração de imagens...';
            document.getElementById('timer').style.display = 'block';
            document.getElementById('phrasesPanel').style.display = 'none';

            // Enviar para geração final
            const payload = {
                session_id: currentSessionId,
                phrases: updatedPhrases
            };

            try {
                const response = await fetch('/generate_final', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();

                if (result.success) {
                    statusDiv.innerText = 'Pronto! Renderização concluída.';
                    const fileUrl = '/download/' + result.file + '?t=' + new Date().getTime();
                    const mediaOutput = document.getElementById('mediaOutput');
                    const downloadLink = document.getElementById('downloadLink');
                    
                    if (result.type === 'video') {
                        mediaOutput.innerHTML = `<video id="vPlayer" controls><source src="${fileUrl}" type="video/mp4"></video>`;
                        document.getElementById('vPlayer').load();
                    } else if (result.type === 'carousel') {
                        // Exibe todas as imagens em grade
                        let html = '<div style="display:flex; flex-direction:column; gap:10px;">';
                        result.files.forEach(file => {
                            html += `<img src="/download/${file}" style="margin-bottom:10px;">`;
                        });
                        html += '</div>';
                        mediaOutput.innerHTML = html;
                        downloadLink.href = '#';
                        downloadLink.style.display = 'none';
                    } else {
                        mediaOutput.innerHTML = `<img src="${fileUrl}">`;
                    }

                    if (result.type !== 'carousel') {
                        downloadLink.href = fileUrl;
                        downloadLink.style.display = 'block';
                    }
                    document.getElementById('videoContainer').style.display = 'block';
                } else {
                    statusDiv.innerText = 'Falha: ' + result.error;
                }
            } catch (error) {
                statusDiv.innerText = 'Erro na geração final.';
            } finally {
                btn.disabled = false;
                clearInterval(window.statusInterval);
            }
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
    </script>
</body>
</html>
