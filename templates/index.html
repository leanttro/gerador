<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motor Dark</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0d0d0d;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: #1a1a1a;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #00ffcc;
        }
        input {
            width: 90%;
            padding: 15px;
            margin-bottom: 20px;
            border: none;
            border-radius: 6px;
            background-color: #333;
            color: white;
            font-size: 16px;
            outline: none;
        }
        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 6px;
            background-color: #00ffcc;
            color: #000;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background-color: #00b38f;
        }
        button:disabled {
            background-color: #555;
            color: #888;
            cursor: not-allowed;
        }
        #status {
            margin-top: 20px;
            font-size: 14px;
            color: #aaaaaa;
            min-height: 20px;
        }
        #videoContainer {
            margin-top: 30px;
            display: none;
            width: 100%;
        }
        video {
            width: 100%;
            border-radius: 8px;
            border: 2px solid #00ffcc;
        }
        .download-link {
            display: block;
            margin-top: 15px;
            color: #00ffcc;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Painel de Controle</h1>
        <input type="text" id="niche" placeholder="Defina o nicho do canal">
        <button id="btnGenerate" onclick="startProcess()">Executar Motor</button>
        <div id="status"></div>

        <div id="videoContainer">
            <video id="videoPlayer" controls>
                <source id="videoSource" src="" type="video/mp4">
                Seu navegador não suporta vídeos.
            </video>
            <a id="downloadLink" class="download-link" href="#" download>Baixar Vídeo Final</a>
        </div>
    </div>

    <script>
        async function startProcess() {
            const niche = document.getElementById('niche').value;
            const statusDiv = document.getElementById('status');
            const btn = document.getElementById('btnGenerate');
            const videoContainer = document.getElementById('videoContainer');
            const videoPlayer = document.getElementById('videoPlayer');
            const videoSource = document.getElementById('videoSource');
            const downloadLink = document.getElementById('downloadLink');
            
            if (!niche) {
                statusDiv.innerText = 'Preencha o nicho primeiro';
                return;
            }

            statusDiv.innerText = 'Construindo o ativo digital, aguarde...';
            btn.disabled = true;
            videoContainer.style.display = 'none';

            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ niche })
                });

                const result = await response.json();

                if (result.success) {
                    statusDiv.innerText = 'Pronto! Vídeo renderizado.';
                    
                    // Atualiza o player e o link de download
                    const videoUrl = '/download/' + result.file + '?t=' + new Date().getTime();
                    videoSource.src = videoUrl;
                    downloadLink.href = videoUrl;
                    
                    videoContainer.style.display = 'block';
                    videoPlayer.load();
                } else {
                    statusDiv.innerText = 'Falha: ' + result.error;
                }
            } catch (error) {
                statusDiv.innerText = 'Erro de rede ou tempo limite atingido. Verifique os logs no Dokploy.';
            } finally {
                btn.disabled = false;
            }
        }
    </script>

</body>
</html>
