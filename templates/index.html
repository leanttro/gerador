<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motor Dark | Studio Avançado</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --netflix-red: #E50914;
            --netflix-red-hover: #F40612;
            --bg-base: #141414;
            --bg-card: #181818;
            --bg-input: #333333;
            --text-main: #FFFFFF;
            --text-muted: #B3B3B3;
            --border-color: #404040;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        header {
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(20,20,20,0) 100%);
            padding: 25px 50px;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
        }
        
        header h1 {
            color: var(--netflix-red);
            font-size: 32px;
            font-weight: 800;
            text-transform: uppercase;
        }
        
        main {
            padding: 120px 50px 50px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }
        
        .step-container {
            display: none;
            margin-bottom: 40px;
        }
        
        .step-container.active {
            display: block;
        }
        
        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 30px;
            margin-bottom: 25px;
        }
        
        h2 {
            font-size: 20px;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }
        
        input[type="text"], select, textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background-color: var(--bg-input);
            color: var(--text-main);
            margin-bottom: 15px;
        }
        
        .btn {
            padding: 14px 24px;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            background-color: var(--netflix-red);
            color: #fff;
            width: 100%;
            font-size: 16px;
        }
        
        .btn:hover {
            background-color: var(--netflix-red-hover);
        }
        
        .grid-results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        
        .result-item {
            background: var(--bg-input);
            padding: 15px;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid transparent;
        }
        
        .result-item:hover {
            border-color: var(--netflix-red);
        }
        
        .editor-workspace {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }
        
        .canvas-area {
            background: #000;
            border: 1px dashed var(--border-color);
            position: relative;
            overflow: hidden;
        }
        
        .canvas-element {
            position: absolute;
            cursor: move;
            user-select: none;
        }
        
        .text-element {
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 4px;
            white-space: pre-wrap;
            text-align: center;
        }
        
        .logo-element {
            width: 80px;
        }
        
        .controls-area {
            flex: 1;
            min-width: 300px;
        }
        
        #loadingSpinner {
            display: none;
            margin: 20px auto;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-left-color: var(--netflix-red);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <header>
        <h1>Motor Dark Studio</h1>
    </header>
    
    <main>
        <div id="step1" class="step-container active">
            <div class="card">
                <h2>1. Pesquisar Referências Virais</h2>
                <input type="text" id="searchNiche" placeholder="Digite o nicho (ex: Curiosidades Históricas)">
                <button class="btn" onclick="searchViral()">Buscar no Serper</button>
                <div id="loadingSpinner" class="spinner-1"></div>
                <div class="grid-results" id="searchResults"></div>
            </div>
        </div>

        <div id="step2" class="step-container">
            <div class="card">
                <h2>2. Direção de Arte e Roteiro (IA)</h2>
                <div id="loadingSpinner" class="spinner-2"></div>
                
                <label>Script Narrado</label>
                <textarea id="scriptText" rows="3"></textarea>
                
                <label>Prompts Visuais (Gerados pelo Groq)</label>
                <textarea id="promptsText" rows="3"></textarea>
                
                <label>Motor Sugerido</label>
                <select id="engineSelect">
                    <option value="pollinations">Pollinations</option>
                    <option value="pixabay">Pixabay</option>
                    <option value="leonardo">Leonardo.ai</option>
                </select>
                
                <label>Proporção</label>
                <select id="ratioSelect">
                    <option value="9:16">Vertical 9:16</option>
                    <option value="16:9">Horizontal 16:9</option>
                    <option value="1:1">Quadrado 1:1</option>
                </select>
                
                <button class="btn" onclick="generateRawImages()">Gerar Imagens Base</button>
            </div>
        </div>

        <div id="step3" class="step-container">
            <div class="card">
                <h2>3. Editor Visual Canva</h2>
                <div class="editor-workspace">
                    <div class="canvas-area" id="canvasBox" style="width: 300px; height: 533px;">
                        <img id="bgPreview" src="" style="width: 100%; height: 100%; object-fit: cover;">
                        <div id="dragText" class="canvas-element text-element" style="left: 10%; top: 70%; color: #FFFFFF; font-family: Arial;">Texto da Cena</div>
                        <img id="dragLogo" class="canvas-element logo-element" src="" style="display:none; left: 10px; top: 10px;">
                    </div>
                    
                    <div class="controls-area">
                        <label>Textos Cenas (Separados por linha)</label>
                        <textarea id="scenePhrases" rows="4">Cena 1&#10;Cena 2&#10;Cena 3&#10;Cena 4</textarea>
                        
                        <label>Cor do Texto</label>
                        <input type="color" id="textColor" value="#FFFFFF" onchange="updateEditor()">
                        
                        <label>Fonte</label>
                        <select id="fontFamily" onchange="updateEditor()">
                            <option value="Arial">Arial</option>
                            <option value="Verdana">Verdana</option>
                            <option value="Courier New">Courier</option>
                        </select>
                        
                        <label>Sua Logo</label>
                        <input type="file" id="logoUpload" accept="image/png" onchange="loadLogo(event)">
                        
                        <label>Formato Final</label>
                        <select id="modeSelect">
                            <option value="video">Vídeo Completo (MP4)</option>
                            <option value="carrossel">Carrossel (Imagens)</option>
                        </select>
                        
                        <button class="btn" onclick="renderFinal()">Finalizar Produção</button>
                        
                        <div id="loadingSpinner" class="spinner-3"></div>
                        <div id="statusTracker" style="margin-top: 10px; color: var(--netflix-red);"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="step4" class="step-container">
            <div class="card" style="text-align: center;">
                <h2>Pronto!</h2>
                <div id="finalOutput"></div>
            </div>
        </div>
    </main>

    <script>
        let rawImages = [];
        let pollInterval;

        function showSpinner(className) {
            document.querySelector(className).style.display = 'block';
        }
        
        function hideSpinner(className) {
            document.querySelector(className).style.display = 'none';
        }
        
        function switchStep(stepId) {
            document.querySelectorAll('.step-container').forEach(e => e.classList.remove('active'));
            document.getElementById(stepId).classList.add('active');
        }

        async function searchViral() {
            const niche = document.getElementById('searchNiche').value;
            
            if(!niche) {
                alert("Digite o nicho");
                return;
            }
            
            showSpinner('.spinner-1');
            
            try {
                const response = await fetch('/api/search', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({niche})
                });
                
                const data = await response.json();
                const container = document.getElementById('searchResults');
                container.innerHTML = '';
                
                if(data.success) {
                    data.data.forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'result-item';
                        div.innerHTML = `<strong>${item.title}</strong><p style="font-size:12px; margin-top:5px; color:gray;">${item.snippet}</p>`;
                        div.onclick = () => analyzeRef(item.title + " " + item.snippet);
                        container.appendChild(div);
                    });
                }
            } catch(e) {
                alert("Erro na busca");
            }
            
            hideSpinner('.spinner-1');
        }

        async function analyzeRef(content) {
            switchStep('step2');
            showSpinner('.spinner-2');
            
            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({content})
                });
                
                const data = await response.json();
                
                if(data.success) {
                    document.getElementById('scriptText').value = data.data.script;
                    document.getElementById('promptsText').value = JSON.stringify(data.data.prompts);
                    document.getElementById('engineSelect').value = data.data.engine === 'pixabay' ? 'pixabay' : 'pollinations';
                    document.getElementById('textColor').value = data.data.color || "#FFFFFF";
                    document.getElementById('fontFamily').value = data.data.font || "Arial";
                }
            } catch(e) {
                alert("Erro na IA");
            }
            
            hideSpinner('.spinner-2');
        }

        async function generateRawImages() {
            const provider = document.getElementById('engineSelect').value;
            const ratio = document.getElementById('ratioSelect').value;
            const prompts = document.getElementById('promptsText').value;
            
            showSpinner('.spinner-2');
            
            const formData = new FormData();
            formData.append('provider', provider);
            formData.append('ratio', ratio);
            formData.append('prompts', prompts);

            try {
                const response = await fetch('/api/generate-raw', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if(data.success) {
                    rawImages = data.images;
                    setupEditor(ratio);
                    switchStep('step3');
                } else {
                    alert(data.error);
                }
            } catch(e) {
                alert("Erro ao gerar");
            }
            
            hideSpinner('.spinner-2');
        }

        function setupEditor(ratio) {
            const box = document.getElementById('canvasBox');
            
            if(ratio === '9:16') {
                box.style.width = '300px';
                box.style.height = '533px';
            }
            
            if(ratio === '16:9') {
                box.style.width = '533px';
                box.style.height = '300px';
            }
            
            if(ratio === '1:1') {
                box.style.width = '400px';
                box.style.height = '400px';
            }
            
            document.getElementById('bgPreview').src = '/media/' + rawImages[0];
            
            makeDraggable(document.getElementById('dragText'), box);
            makeDraggable(document.getElementById('dragLogo'), box);
            
            updateEditor();
        }

        function updateEditor() {
            const txt = document.getElementById('dragText');
            txt.style.color = document.getElementById('textColor').value;
            txt.style.fontFamily = document.getElementById('fontFamily').value;
            
            const phrases = document.getElementById('scenePhrases').value.split('\n');
            txt.innerText = phrases[0] || "Texto Exemplo";
        }

        function loadLogo(event) {
            const file = event.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = e => {
                    const l = document.getElementById('dragLogo');
                    l.src = e.target.result;
                    l.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        }

        function makeDraggable(elmnt, container) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            elmnt.onmousedown = dragMouseDown;
            
            function dragMouseDown(e) {
                e.preventDefault();
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
            }
            
            function elementDrag(e) {
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                
                let newTop = elmnt.offsetTop - pos2;
                let newLeft = elmnt.offsetLeft - pos1;
                
                newTop = Math.max(0, Math.min(newTop, container.clientHeight - elmnt.clientHeight));
                newLeft = Math.max(0, Math.min(newLeft, container.clientWidth - elmnt.clientWidth));
                
                elmnt.style.top = newTop + "px";
                elmnt.style.left = newLeft + "px";
            }
            
            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
            }
        }

        async function renderFinal() {
            showSpinner('.spinner-3');
            
            pollInterval = setInterval(async () => {
                const response = await fetch('/status');
                const stat = await response.json();
                document.getElementById('statusTracker').innerText = stat.step;
            }, 1000);

            const box = document.getElementById('canvasBox');
            const txt = document.getElementById('dragText');
            const logo = document.getElementById('dragLogo');
            
            const text_x = txt.offsetLeft / box.clientWidth;
            const text_y = txt.offsetTop / box.clientHeight;
            const logo_x = logo.offsetLeft / box.clientWidth;
            const logo_y = logo.offsetTop / box.clientHeight;

            const formData = new FormData();
            formData.append('mode', document.getElementById('modeSelect').value);
            formData.append('images', JSON.stringify(rawImages));
            formData.append('phrases', JSON.stringify(document.getElementById('scenePhrases').value.split('\n')));
            formData.append('script', document.getElementById('scriptText').value);
            formData.append('text_x', text_x);
            formData.append('text_y', text_y);
            formData.append('color', document.getElementById('textColor').value);
            formData.append('font', document.getElementById('fontFamily').value);
            formData.append('logo_x', logo_x);
            formData.append('logo_y', logo_y);

            const logoFile = document.getElementById('logoUpload').files[0];
            if(logoFile) {
                formData.append('logo', logoFile);
            }

            try {
                const response = await fetch('/api/render-final', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                clearInterval(pollInterval);
                hideSpinner('.spinner-3');
                
                if(data.success) {
                    switchStep('step4');
                    const out = document.getElementById('finalOutput');
                    
                    if(data.type === 'video') {
                        out.innerHTML = `<video controls width="300"><source src="/media/${data.file}?t=${Date.now()}" type="video/mp4"></video><br><a href="/media/${data.file}" download class="btn" style="display:inline-block; margin-top:20px; width:auto;">Baixar Vídeo</a>`;
                    } else {
                        let html = '';
                        data.files.forEach(f => {
                            html += `<img src="/media/${f}?t=${Date.now()}" width="200" style="margin:10px;">`;
                        });
                        out.innerHTML = html;
                    }
                } else {
                    alert(data.error);
                }
            } catch(e) {
                clearInterval(pollInterval);
                hideSpinner('.spinner-3');
                alert("Erro render");
            }
        }
    </script>
</body>
</html>
